<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 4 Math Warmups</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/gr4.css">
    <style>
        /* --- Styles for Matrix Grid --- */
        table.match-grid {
            border-collapse: collapse;
            margin: 20px auto;
            width: 100%;
            table-layout: fixed;
        }

        table.match-grid th,
        table.match-grid td {
            border: 1px solid #333;
            padding: 8px; 
            text-align: center;
            vertical-align: middle;
            word-wrap: break-word;
        }

        table.match-grid th:first-child,
        table.match-grid td:first-child {
            width: 30%; 
            background-color: #fafafa;
        }
        
        table.match-grid th {
            background-color: #f0f0f0;
            color: black;
        }

        table.match-grid th.corner-cell {
            background-color: white;
            border: none;
        }

        table.match-grid .fraction-wrap {
            transform: scale(0.9);
            margin: 0 auto;
        }

        /* --- Standard Grid Enhancements --- */
        table.caaspp-grid td:first-child .mixed-text-container {
            justify-content: flex-start; /* Keep expressions left-aligned and tightly grouped */
        }

        /* Pie Chart Styles */
        .pie-chart-container {
            display: inline-block;
            vertical-align: middle;
        }
        
        /* Rect Model Styles */
        .rect-model-container {
            display: block;
            margin: 10px auto;
            text-align: center;
        }

        /* Mixed Text Container */
        .mixed-text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 18px;
        }

        /* Checkboxes */
        input[type="checkbox"] {
            transform: scale(1.5);
            accent-color: #2ecc71;
            cursor: pointer;
        }

        /* Validation Colors */
        td.cell-correct {
            background-color: #d4edda !important;
        }

        td.cell-incorrect {
            background-color: #f8d7da !important;
        }
        
        .grid-answer-indicator {
            font-size: 12px;
            color: #27ae60;
            font-weight: bold;
            margin-top: 4px;
        }

        /* --- Multiple Choice Styles --- */
        .mc-container {
            text-align: left;
            display: inline-block;
            margin-top: 10px;
        }
        .mc-label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .mc-label:hover {
            background-color: #f0f8ff;
        }
        .mc-label input[type="radio"] {
            transform: scale(1.4);
            margin-right: 12px;
            cursor: pointer;
        }
        .mc-correct-text {
            color: #27ae60;
            font-weight: bold;
            background-color: #e8f8f5;
        }
        .mc-incorrect-text {
            color: #e74c3c;
            text-decoration: line-through;
        }

        /* --- PRINT STYLES --- */
        @media print {
            @page {
                size: letter landscape;
                margin: 0.5in;
            }

            * { box-sizing: border-box; }

            body {
                background: none;
                margin: 0;
                padding: 0;
                font-size: 14pt; /* Scaled up from 12pt */
                width: 100%;
            }

            .container {
                width: 100%;
                max-width: none;
                border: none;
                box-shadow: none;
                padding: 0;
                margin: 0;
            }

            /* Hide UI Elements */
            .home-btn, .print-btn, .module-nav, .nav-container, .footer-controls, #btnExtra, .check-btn {
                display: none !important;
            }

            /* --- PACKET LAYOUT --- */
            
            #content-area {
                column-count: 2;
                column-gap: 0.5in;
                column-fill: auto;
                width: 100%;
                display: block;
            }

            /* Base Day Wrapper - NO DEFAULT BREAKS */
            .day-content {
                display: block !important; 
                break-inside: auto; 
                margin-bottom: 0;
                padding-bottom: 20px;
                border-bottom: none;
                width: 100%;
                break-before: auto;
                page-break-before: auto;
                -webkit-column-break-before: auto;
            }

            /* Prescriptive Print Break Classes */
            .print-page-break {
                break-before: page !important;
                page-break-before: always !important; /* Fallback */
            }

            .print-col-break {
                break-before: column !important;
                -webkit-column-break-before: always !important; /* Safari fallback */
            }

            .print-page-break-header {
                break-before: page !important;
                page-break-before: always !important; /* Fallback */
                column-span: all;
            }

            /* Question Card */
            .question-card {
                break-inside: avoid;
                page-break-inside: avoid;
                -webkit-column-break-inside: avoid;
                display: block;
                width: 100%;
                margin-bottom: 18px; /* Increased margin */
                padding: 12px 15px;  /* Increased padding */
                border: 1px solid #ccc;
                box-shadow: none;
                background: #fff;
            }

            h3 {
                margin-top: 0;
                margin-bottom: 12px;
                font-size: 16pt; /* Scaled up */
                border-bottom: 2px solid #000;
                text-align: center;
                break-after: avoid;
            }

            .print-header {
                column-span: all;
                display: flex;
                justify-content: space-between;
                margin-bottom: 15px;
                border-bottom: 2px solid #000;
                padding-bottom: 5px;
                font-weight: bold;
            }
            
            .print-spacer { display: none; }

            /* --- CONTENT SIZING --- */

            .mixed-text-container { font-size: 13pt; gap: 6px; } /* Scaled up */
            .instructions { font-size: 13pt; margin-bottom: 8px; margin-top: 0; } /* Scaled up */
            .mc-label { font-size: 13pt; margin: 12px 0; } /* Scaled up */

            /* Number Line Optimization (Mod 1/2) */
            .number-line-container svg {
                width: 100%;
                height: auto;
                max-height: 85px; 
            }

            /* --- TABLE BORDER ENFORCEMENT FOR PRINT --- */
            table.match-grid, table.caaspp-grid {
                border-collapse: collapse !important;
                border: 2px solid #000 !important; /* Thicker outer border prevents browser drop-outs */
            }
            
            table.match-grid th, table.match-grid td,
            table.caaspp-grid th, table.caaspp-grid td {
                border: 1px solid #000 !important; /* Force internal borders */
            }

            /* Matrix Table Sizing (Mod 3/4) */
            table.match-grid {
                font-size: 12pt; /* Scaled up */
                margin: 10px auto;
            }
            table.match-grid th, table.match-grid td { 
                padding: 12px 4px; /* Relaxed vertical spacing */
            }
            table.match-grid th:first-child, table.match-grid td:first-child { width: 15% !important; }
            table.match-grid th:not(:first-child), table.match-grid td:not(:first-child) { width: 21.25% !important; }
            
            /* Standard Grid Sizing (Mod 1/2/4) */
            table.caaspp-grid {
                table-layout: fixed; /* Force constraint */
                width: 100%;
                font-size: 12pt; /* Scaled up */
                margin-bottom: 10px;
                word-wrap: break-word;
            }
            table.caaspp-grid th, table.caaspp-grid td {
                padding: 10px 8px; /* Relaxed vertical spacing */
                text-align: center;
            }
            /* Make the expression column wider, checkboxes narrower */
            table.caaspp-grid th:first-child, table.caaspp-grid td:first-child {
                text-align: left;
                padding-left: 8px;
                width: 60%;
            }
            table.caaspp-grid th:not(:first-child), table.caaspp-grid td:not(:first-child) {
                width: 20%;
            }

            /* Scaling helpers */
            table.match-grid .fraction-wrap, table.caaspp-grid .fraction-wrap {
                transform: scale(1.05); /* Scaled up fractions in tables */
                transform-origin: center;
                margin: 0 auto;
            }

            table.caaspp-grid td:first-child .fraction-wrap {
                margin: 0; /* Keep left-aligned fractions from centering their container */
            }

            table.match-grid input[type="checkbox"], table.caaspp-grid input[type="checkbox"] {
                transform: scale(1.5); /* Larger checkboxes */
                margin: 0;
            }

            .pie-chart-container svg { width: 50px; height: 50px; } /* Scaled up */
            
            /* Clean up input boxes */
            .frac-input, .std-input, .mixed-whole-input {
                border: 1px solid #000;
                color: transparent !important;
                box-shadow: none;
                min-width: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <button class="home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
        <button class="print-btn" onclick="window.print()">🖨️ Print Packet</button>

        <h1>Grade 4 Math Warmups</h1>

        <div class="module-nav">
            <button class="btn-module" onclick="selectModule(0)">Build Fractions</button>
            <button class="btn-module" onclick="selectModule(1)">Fractions & Decimals</button>
            <button class="btn-module" onclick="selectModule(2)">Equivalence & Ordering</button>
            <button class="btn-module" onclick="selectModule(3)">Place Value & Multidigit</button>
            <button class="btn-module" onclick="selectModule(4)">Review (All Modules)</button>
        </div>

        <div class="nav-container" id="navContainer"></div>
        <div id="content-area"></div>

        <div class="footer-controls" id="footer-controls" style="display:none;">
            <div id="feedback-box" class="feedback-box"></div>
            <button class="check-btn" onclick="checkAnswers()">Check Answers</button>
        </div>

        <button id="btnExtra" class="btn-extra hidden" onclick="startExtraPractice()">⚡ Bonus: Extra Practice</button>

        <div id="extraPracticeContainer" class="hidden">
            <h3 style="color: #8e44ad; border-bottom: 2px dashed #cdb4db;">Mixed Practice Drills</h3>
            <div id="drillGrid" class="drill-grid"></div>
            <button class="btn-extra" style="margin-top: 10px; background-color: #9b59b6;" onclick="checkDrills()">Check My Work</button>
            <div id="drillFeedback" class="feedback-box"></div>
        </div>
    </div>

    <script src="data/gr4/mod1.js"></script>
    <script src="data/gr4/mod2.js"></script>
    <script src="data/gr4/mod3.js"></script>
    <script src="data/gr4/mod4.js"></script>
    <script src="data/gr4/mod5.js"></script>
    <script src="data/gr4/bonus.js"></script>

    <script>
        const appData = {
            modules: [
                typeof module1 !== 'undefined' ? module1 : { id: "m1", name: "Module 1", weeks: [] },
                typeof module2 !== 'undefined' ? module2 : { id: "m2", name: "Module 2", weeks: [] },
                typeof module3 !== 'undefined' ? module3 : { id: "m3", name: "Module 3", weeks: [] },
                typeof module4 !== 'undefined' ? module4 : { id: "m4", name: "Module 4", weeks: [] },
                typeof module5 !== 'undefined' ? module5 : { id: "m5", name: "Module 5", weeks: [] },
            ]
        };

        // --- DOM BUILDERS ---
        function createMultipleChoice(section, qIndex) {
            const div = document.createElement('div');
            div.className = 'mc-container';
            div.setAttribute('data-type', 'multiple-choice');
            
            section.options.forEach((opt, i) => {
                const label = document.createElement('label');
                label.className = 'mc-label';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `mc_${currentDayId}_${qIndex}`;
                radio.value = i;
                radio.setAttribute('data-correct', opt.correct);
                
                const span = document.createElement('span');
                span.innerHTML = opt.text;
                
                label.appendChild(radio);
                label.appendChild(span);
                div.appendChild(label);
            });
            return div;
        }
        
        function createPieChart(n, d) {
            const size = 60;
            const r = size / 2;
            const cx = r, cy = r;
            const container = document.createElement('div'); container.className = 'pie-chart-container';
            let svgContent = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="${r-1}" fill="white" stroke="black" stroke-width="1.5"/>`;
            const step = (Math.PI * 2) / d;
            for (let i = 0; i < d; i++) {
                const startAngle = i * step - (Math.PI / 2);
                const endAngle = (i + 1) * step - (Math.PI / 2);
                const x1 = cx + (r-1) * Math.cos(startAngle);
                const y1 = cy + (r-1) * Math.sin(startAngle);
                const x2 = cx + (r-1) * Math.cos(endAngle);
                const y2 = cy + (r-1) * Math.sin(endAngle);
                const fillColor = i < n ? '#3498db' : 'none';
                const largeArc = step > Math.PI ? 1 : 0;
                svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r-1} ${r-1} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${fillColor}" stroke="black" stroke-width="1" />`;
            }
            svgContent += `</svg>`;
            container.innerHTML = svgContent;
            return container;
        }

        function createRectModel(rows, cols, shaded, fillMode = 'row') {
            const w = 150, h = 80;
            const cellW = w / cols;
            const cellH = h / rows;
            const container = document.createElement('div'); container.className = 'rect-model-container';
            let svg = `<svg width="${w}" height="${h}" style="border: 2px solid black;">`;
            for(let r=0; r<rows; r++){
                for(let c=0; c<cols; c++){
                    let isShaded = false;
                    if (fillMode === 'col') { if ((c * rows + r) < shaded) isShaded = true; }
                    else { if ((r * cols + c) < shaded) isShaded = true; }
                    const color = isShaded ? '#3498db' : 'white';
                    svg += `<rect x="${c*cellW}" y="${r*cellH}" width="${cellW}" height="${cellH}" fill="${color}" stroke="black" stroke-width="1"/>`;
                }
            }
            svg += `</svg>`;
            container.innerHTML = svg;
            return container;
        }

        function createNumberLine(section) {
            const width = 600; const margin = 40; const range = section.end - section.start; const scale = (width - 2 * margin) / range;
            const step = section.step || 0.1; const targetX = margin + (section.target - section.start) * scale;
            const arrowSize = 10;
            const leftArrow = `<polygon points="${margin},35 ${margin},45 ${margin - arrowSize},40" fill="black" />`;
            const rightArrow = `<polygon points="${width - margin},35 ${width - margin},45 ${width - margin + arrowSize},40" fill="black" />`;
            let ticks = []; const stepCount = Math.round(range / step);
            for (let i = 0; i <= stepCount; i++) {
                let val = section.start + (i * step); val = parseFloat(val.toFixed(2));
                let x = margin + (val - section.start) * scale;
                let isMajor = false;
                if (step === 0.01) { if (i % 5 === 0) isMajor = true; } else { if (Number.isInteger(val) || (range <= 2 && i % 5 === 0)) isMajor = true; }
                let y2 = isMajor ? 60 : 50; let label = '';
                if (isMajor) { label = `<text x="${x}" y="85" text-anchor="middle" font-size="16">${val}</text>`; }
                ticks.push(`<line x1="${x}" y1="40" x2="${x}" y2="${y2}" stroke="black" stroke-width="${isMajor ? 3 : 2}" />${label}`);
            }
            const svgHTML = `
            <div class="number-line-container">
                <svg width="100%" height="100%" viewBox="0 0 ${width} 100" style="background:#fff; border-radius:10px; max-width:${width}px;">
                    <line x1="${margin}" y1="40" x2="${width - margin}" y2="40" stroke="black" stroke-width="3" />
                    ${leftArrow} ${rightArrow} ${ticks.join('')}
                    <circle cx="${targetX}" cy="40" r="6" fill="#e74c3c" />
                    <text x="${targetX}" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c">${section.label}</text>
                </svg>
            </div>
            <div style="text-align:center; margin-top:10px; font-size:18px;">
                ${section.label} = <input type="text" class="std-input" data-answer="${section.ans}">
            </div>`;
            const div = document.createElement('div'); div.innerHTML = svgHTML; return div;
        }

        function createMixedRow(probData) {
            const rowDiv = document.createElement('div'); rowDiv.className = 'math-row';
            probData.segments.forEach(seg => {
                if (seg.type === 'text') { const span = document.createElement('span'); span.innerHTML = seg.val; rowDiv.appendChild(span); }
                else if (seg.type === 'input') { const inp = document.createElement('input'); inp.className = 'std-input'; inp.setAttribute('data-answer', seg.ans); rowDiv.appendChild(inp); }
                else if (seg.type === 'mixed_input') { rowDiv.appendChild(createMixedInput(seg.ans)); }
                else if (seg.type === 'fraction_group') { rowDiv.appendChild(createFractionInputGroup(seg.ans)); }
                else if (seg.type === 'fraction') { rowDiv.appendChild(createFraction(seg)); }
            });
            return rowDiv;
        }

        function createFractionInputGroup(correctValueDecimal) {
            const container = document.createElement('div'); container.className = 'fraction-input-group';
            container.setAttribute('data-answer', correctValueDecimal); container.setAttribute('data-type', 'fraction-check');
            const wrapper = document.createElement('div'); wrapper.className = 'fraction-wrap';
            const top = document.createElement('div'); top.className = 'frac-top';
            const numInp = document.createElement('input'); numInp.className = 'frac-input'; top.appendChild(numInp);
            const bot = document.createElement('div'); bot.className = 'frac-bottom';
            const denInp = document.createElement('input'); denInp.className = 'frac-input'; bot.appendChild(denInp);
            wrapper.appendChild(top); wrapper.appendChild(bot); container.appendChild(wrapper); return container;
        }

        function createMixedInput(correctValueDecimal) {
            const wrapper = document.createElement('div'); wrapper.className = 'mixed-input-group';
            wrapper.setAttribute('data-answer', correctValueDecimal); wrapper.setAttribute('data-type', 'mixed-check');
            const wholeInp = document.createElement('input'); wholeInp.className = 'mixed-whole-input'; wholeInp.placeholder = "W";
            const fracWrap = document.createElement('div'); fracWrap.className = 'fraction-wrap';
            const top = document.createElement('div'); top.className = 'frac-top';
            const numInp = document.createElement('input'); numInp.className = 'frac-input'; top.appendChild(numInp);
            const bot = document.createElement('div'); bot.className = 'frac-bottom';
            const denInp = document.createElement('input'); denInp.className = 'frac-input'; bot.appendChild(denInp);
            fracWrap.appendChild(top); fracWrap.appendChild(bot); wrapper.appendChild(wholeInp); wrapper.appendChild(fracWrap); return wrapper;
        }

        function createFraction(seg) {
            const container = document.createElement('div'); container.className = 'fraction-wrap';
            if (seg.w) {
                const wSpan = document.createElement('span'); wSpan.className = 'whole-part'; wSpan.textContent = seg.w;
                const wrapper = document.createElement('div'); wrapper.className = 'mixed-text-container';
                const innerTop = document.createElement('div'); innerTop.className = 'frac-top'; innerTop.textContent = seg.n;
                const innerBot = document.createElement('div'); innerBot.className = 'frac-bottom'; innerBot.textContent = seg.d;
                container.appendChild(innerTop); container.appendChild(innerBot); wrapper.appendChild(wSpan); wrapper.appendChild(container); return wrapper;
            }
            const top = document.createElement('div'); top.className = 'frac-top';
            if (seg.n === 'box') { const inp = document.createElement('input'); inp.className = 'frac-input'; inp.setAttribute('data-answer', seg.ans || seg.ansN); top.appendChild(inp); }
            else { top.textContent = seg.n; }
            const bot = document.createElement('div'); bot.className = 'frac-bottom';
            if (seg.d === 'box') { const inp = document.createElement('input'); inp.className = 'frac-input'; inp.setAttribute('data-answer', seg.ansD); bot.appendChild(inp); }
            else { bot.textContent = seg.d; }
            container.appendChild(top); container.appendChild(bot); return container;
        }

        function createGrid(section) {
            const table = document.createElement('table'); table.className = 'caaspp-grid';
            const col1Label = section.col1 || 'True';
            const col2Label = section.col2 || 'False';
            
            table.innerHTML = `<tr><th style="width: 50%">Expression</th><th>${col1Label}</th><th>${col2Label}</th></tr>`;
            section.rows.forEach(row => {
                const tr = document.createElement('tr'); tr.setAttribute('data-type', 'grid-row');
                const tdLabel = document.createElement('td');
                if (row.segments) {
                    const mixedCont = document.createElement('div'); mixedCont.className = 'mixed-text-container';
                    row.segments.forEach(seg => {
                        if (seg.type === 'text') { const s = document.createElement('span'); s.innerHTML = seg.val; mixedCont.appendChild(s); }
                        else if (seg.type === 'fraction') { mixedCont.appendChild(createFraction(seg)); }
                    });
                    tdLabel.appendChild(mixedCont);
                } else { tdLabel.innerHTML = row.text; }
                tr.appendChild(tdLabel);
                tr.innerHTML += `<td><input type="checkbox" data-correct="${row.correct}"></td><td><input type="checkbox" data-correct="${!row.correct}"></td>`;
                table.appendChild(tr);
            });
            return table;
        }

        function createMatchGrid(section) {
            const table = document.createElement('table'); table.className = 'match-grid'; table.setAttribute('data-type', 'match-grid');
            const thead = document.createElement('tr');
            const thCorner = document.createElement('th'); thCorner.className = 'corner-cell'; thead.appendChild(thCorner);
            section.colHeaders.forEach(col => {
                const th = document.createElement('th');
                if (col.type === 'pie') { th.appendChild(createPieChart(col.n, col.d)); }
                else if (col.type === 'fraction') { th.appendChild(createFraction(col)); }
                else { th.innerText = col.val; }
                thead.appendChild(th);
            });
            table.appendChild(thead);
            section.rows.forEach((rowData, rIdx) => {
                const tr = document.createElement('tr'); tr.setAttribute('data-row-idx', rIdx);
                const tdLabel = document.createElement('td');
                if (rowData.label.type === 'fraction') tdLabel.appendChild(createFraction(rowData.label)); else tdLabel.innerText = rowData.label.val;
                tr.appendChild(tdLabel);
                rowData.matches.forEach(isMatch => {
                    const td = document.createElement('td');
                    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.setAttribute('data-correct', isMatch);
                    td.appendChild(cb); tr.appendChild(td);
                });
                table.appendChild(tr);
            });
            return table;
        }

        // --- CORE LOGIC ---
        let currentModuleIndex = -1;
        let currentDayId = '';
        let attempts = {};

        function selectModule(index) {
            currentModuleIndex = index;
            document.querySelectorAll('.btn-module').forEach((btn, idx) => { if (idx === index) btn.classList.add('active'); else btn.classList.remove('active'); });
            const module = appData.modules[index];
            const navContainer = document.getElementById('navContainer');
            const contentArea = document.getElementById('content-area');
            navContainer.innerHTML = ''; contentArea.innerHTML = '';
            document.getElementById('footer-controls').style.display = 'none';

            if (!module.weeks || module.weeks.length === 0) {
                contentArea.innerHTML = `<div class="tbd-message">Coming Soon: ${module.name} content is under development! 🚧</div>`;
                document.getElementById('btnExtra').classList.add('hidden');
                document.getElementById('extraPracticeContainer').classList.add('hidden');
            } else {
                document.getElementById('btnExtra').classList.remove('hidden');
                document.getElementById('extraPracticeContainer').classList.add('hidden');
                
                module.weeks.forEach(weekData => {
                    const weekLabel = document.createElement('div'); weekLabel.className = 'week-label'; weekLabel.textContent = `Week ${weekData.weekNum}`; navContainer.appendChild(weekLabel);
                    const row = document.createElement('div'); row.className = 'week-row';
                    
                    weekData.days.forEach(day => {
                        const btn = document.createElement('button'); btn.className = 'nav-btn'; btn.textContent = day.name; btn.onclick = () => showDay(day.id, btn); row.appendChild(btn);
                        
                        // Add Header only for Mondays
                        if (day.name === "Mon") {
                            const headerDiv = document.createElement('div'); 
                            headerDiv.className = 'print-header'; 
                            // If this is Week 2 Monday, force the header to start on a new page
                            if (contentArea.children.length > 0) { 
                                headerDiv.classList.add('print-page-break-header'); 
                            }
                            headerDiv.innerHTML = '<div>Name: __________________________</div><div>Date: __________________________</div>'; 
                            contentArea.appendChild(headerDiv);
                        }
                        
                        const dayDiv = document.createElement('div'); 
                        dayDiv.id = day.id; 
                        
                        // Prescriptive formatting rules based on the Day of the week
                        let printClass = '';
                        if (day.name === "Tue" || day.name === "Thu") {
                            printClass = 'print-col-break';
                        } else if (day.name === "Wed" || day.name === "Fri") {
                            printClass = 'print-page-break';
                        }
                        
                        dayDiv.className = `day-content hidden ${printClass}`;
                        
                        const modLabel = "M" + (index + 1);
                        const h3 = document.createElement('h3'); h3.innerHTML = `${day.title}<span class="print-mod-label">${modLabel}</span>`; dayDiv.appendChild(h3);
                        
                        day.sections.forEach((section, sIdx) => {
                            const card = document.createElement('div'); card.className = 'question-card';
                            const instr = document.createElement('p'); instr.className = 'instructions';
                            if (section.instructionSegments) {
                                const container = document.createElement('div'); container.className = 'mixed-text-container';
                                section.instructionSegments.forEach(seg => { if (seg.type === 'text') { const s = document.createElement('span'); s.innerHTML = seg.val; container.appendChild(s); } else if (seg.type === 'fraction') { container.appendChild(createFraction(seg)); } });
                                instr.appendChild(container);
                            } else { instr.innerHTML = section.instruction; }
                            card.appendChild(instr);
                            
                            // Render Types
                            if (section.type === 'mixed_row') section.problems.forEach(prob => card.appendChild(createMixedRow(prob)));
                            else if (section.type === 'grid') card.appendChild(createGrid(section));
                            else if (section.type === 'matrix_match') card.appendChild(createMatchGrid(section));
                            else if (section.type === 'multiple_choice') card.appendChild(createMultipleChoice(section, sIdx));
                            else if (section.type === 'word_problem') {
                                const pText = document.createElement('div'); pText.className = 'word-prob-text';
                                section.textSegments.forEach(seg => { if (seg.type === 'text') { const span = document.createElement('span'); span.textContent = seg.val; pText.appendChild(span); } else if (seg.type === 'fraction') { pText.appendChild(createFraction(seg)); } });
                                card.appendChild(pText); section.problems.forEach(prob => card.appendChild(createMixedRow(prob)));
                            } else if (section.type === 'number_line') card.appendChild(createNumberLine(section));
                            else if (section.type === 'rect_model_equiv') {
                                section.problems.forEach(prob => {
                                    card.appendChild(createRectModel(prob.rows, prob.cols, prob.shaded, prob.fillMode));
                                    
                                    const t = document.createElement('div'); 
                                    t.className = 'mixed-text-container'; 
                                    t.style.marginTop = '10px';
                                    if(prob.textSegments) {
                                        prob.textSegments.forEach(seg => {
                                            if (seg.type === 'text') { const s = document.createElement('span'); s.innerText = seg.val; t.appendChild(s); } 
                                            else if (seg.type === 'fraction') { t.appendChild(createFraction(seg)); }
                                        });
                                    } else { t.innerText = prob.text || ""; }
                                    card.appendChild(t);

                                    const inputGroup = document.createElement('div');
                                    inputGroup.className = 'fraction-input-group';
                                    inputGroup.setAttribute('data-answer', prob.ans);
                                    inputGroup.setAttribute('data-type', 'equiv-frac');
                                    const wrap = document.createElement('div'); wrap.className = 'fraction-wrap';
                                    const top = document.createElement('div'); top.className = 'frac-top';
                                    const nInp = document.createElement('input'); nInp.className = 'frac-input'; top.appendChild(nInp);
                                    const bot = document.createElement('div'); bot.className = 'frac-bottom';
                                    const dInp = document.createElement('input'); dInp.className = 'frac-input'; bot.appendChild(dInp);
                                    wrap.appendChild(top); wrap.appendChild(bot); inputGroup.appendChild(wrap);
                                    card.appendChild(inputGroup);
                                });
                            }
                            dayDiv.appendChild(card);
                        });
                        contentArea.appendChild(dayDiv);
                    });
                    navContainer.appendChild(row);
                });
                const placeholder = document.createElement('div'); placeholder.id = 'placeholder'; placeholder.style.textAlign = 'center'; placeholder.style.color = '#888'; placeholder.style.marginTop = '50px'; placeholder.style.fontSize = '20px'; placeholder.textContent = "Select a day above to view the problems."; contentArea.appendChild(placeholder);
            }
        }

        function showDay(dayId, btnElement) {
            currentDayId = dayId;
            const ph = document.getElementById('placeholder'); if (ph) ph.style.display = 'none';
            document.querySelectorAll('.day-content').forEach(d => d.classList.add('hidden'));
            document.getElementById(dayId).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btnElement.classList.add('active');
            document.getElementById('footer-controls').style.display = 'flex';
            document.getElementById('extraPracticeContainer').classList.add('hidden');
            if (!attempts[dayId]) attempts[dayId] = 0;
            resetUIForDay(dayId);
        }

        function resetUIForDay(dayId) {
            const feedback = document.getElementById('feedback-box');
            const btn = document.querySelector('.check-btn');
            const container = document.getElementById(dayId);
            if (attempts[dayId] >= 2) {
                feedback.textContent = "Review your answers above."; feedback.className = "feedback-box info";
                btn.disabled = true; btn.textContent = "Completed";
                revealAnswers(container);
            } else {
                feedback.style.display = 'none'; btn.disabled = false; btn.textContent = "Check Answers";
            }
        }

        function checkAnswers() {
            if (!currentDayId) return;
            const container = document.getElementById(currentDayId);
            let allCorrect = true;

            // Text Inputs (Support multiple answers separated by |)
            container.querySelectorAll('input.std-input, input.frac-input').forEach(input => {
                if (input.closest('.mixed-input-group') || input.closest('.fraction-input-group')) return;
                
                let userVal = input.value.trim(); 
                let correctValStr = input.getAttribute('data-answer');
                let isCorrect = false;

                // Support multiple accepted answers using pipe '|'
                let correctVals = correctValStr.split('|');
                let cleanUserVal = userVal.replace(/,/g, '');

                for (let i = 0; i < correctVals.length; i++) {
                    let cVal = correctVals[i];
                    let cleanCorrectVal = cVal.replace(/,/g, '');

                    const userNum = parseFloat(cleanUserVal);
                    const correctNum = parseFloat(cleanCorrectVal);

                    if (!isNaN(userNum) && !isNaN(correctNum)) {
                        if (Math.abs(userNum - correctNum) < 0.0001) { 
                            isCorrect = true; 
                            break; 
                        }
                    } else {
                        if (userVal === cVal) { 
                            isCorrect = true; 
                            break; 
                        }
                    }
                }

                if (isCorrect) { input.classList.add('correct-bg'); input.classList.remove('incorrect-bg'); }
                else { input.classList.add('incorrect-bg'); input.classList.remove('correct-bg'); allCorrect = false; }
            });

            // Math Fractions
            container.querySelectorAll('.mixed-input-group, .fraction-input-group').forEach(group => {
                const inputs = group.querySelectorAll('input');
                const type = group.getAttribute('data-type');
                const target = parseFloat(group.getAttribute('data-answer'));
                let isCorrect = false;

                if (type === 'equiv-frac') {
                    const n = parseFloat(inputs[0].value);
                    const d = parseFloat(inputs[1].value);
                    if (!isNaN(n) && !isNaN(d) && d !== 0) {
                        const val = n / d;
                        if (Math.abs(val - target) < 0.001) isCorrect = true;
                    }
                } else if (type === 'mixed-check') {
                    const w = parseFloat(inputs[0].value) || 0;
                    const n = parseFloat(inputs[1].value) || 0;
                    const d = parseFloat(inputs[2].value) || 1;
                    const val = w + (n/d);
                    if (Math.abs(val - target) < 0.001) isCorrect = true;
                } else {
                    const n = parseFloat(inputs[0].value) || 0;
                    const d = parseFloat(inputs[1].value) || 1;
                    const val = n/d;
                    if (Math.abs(val - target) < 0.001) isCorrect = true;
                }

                if (isCorrect) inputs.forEach(i => { i.classList.add('correct-bg'); i.classList.remove('incorrect-bg'); });
                else { inputs.forEach(i => { i.classList.add('incorrect-bg'); i.classList.remove('correct-bg'); }); allCorrect = false; }
            });

            // T/F Grids
            container.querySelectorAll('tr[data-type="grid-row"]').forEach(row => {
                const checkboxes = row.querySelectorAll('input[type="checkbox"]');
                const trueBox = checkboxes[0]; const falseBox = checkboxes[1];
                const correctIsFirst = trueBox.getAttribute('data-correct') === 'true';
                let isRowCorrect = false;
                if (correctIsFirst && trueBox.checked && !falseBox.checked) isRowCorrect = true;
                else if (!correctIsFirst && !trueBox.checked && falseBox.checked) isRowCorrect = true;
                const cells = row.querySelectorAll('td');
                if (isRowCorrect) { cells.forEach(td => { td.classList.add('cell-correct'); td.classList.remove('cell-incorrect'); }); }
                else { cells.forEach(td => { td.classList.add('cell-incorrect'); td.classList.remove('cell-correct'); }); allCorrect = false; }
            });

            // Matrix Match
            container.querySelectorAll('table[data-type="match-grid"]').forEach(table => {
                table.querySelectorAll('tr').forEach((row, idx) => {
                    if (idx === 0) return;
                    const checkboxes = row.querySelectorAll('input[type="checkbox"]');
                    checkboxes.forEach(box => {
                        const isCorrectBox = box.getAttribute('data-correct') === 'true';
                        const parentTd = box.parentNode;
                        if (box.checked) {
                            if (isCorrectBox) { parentTd.classList.add('cell-correct'); parentTd.classList.remove('cell-incorrect'); }
                            else { parentTd.classList.add('cell-incorrect'); parentTd.classList.remove('cell-correct'); allCorrect = false; }
                        } else {
                            if (isCorrectBox) { parentTd.classList.add('cell-incorrect'); parentTd.classList.remove('cell-correct'); allCorrect = false; }
                            else { parentTd.classList.remove('cell-correct'); parentTd.classList.remove('cell-incorrect'); }
                        }
                    });
                });
            });

            // Multiple Choice
            container.querySelectorAll('.mc-container').forEach(mc => {
                let isCorrect = false;
                mc.querySelectorAll('.mc-label').forEach(lbl => lbl.classList.remove('mc-correct-text', 'mc-incorrect-text'));
                
                const checked = mc.querySelector('input[type="radio"]:checked');
                if (checked) {
                    if (checked.getAttribute('data-correct') === 'true') {
                        isCorrect = true;
                        checked.parentElement.classList.add('mc-correct-text');
                    } else {
                        checked.parentElement.classList.add('mc-incorrect-text');
                    }
                }
                if (!isCorrect) allCorrect = false;
            });

            const feedback = document.getElementById('feedback-box');
            const btn = document.querySelector('.check-btn');

            if (allCorrect) {
                feedback.textContent = "🎉 PERFECT! Great job!"; feedback.className = "feedback-box correct";
                btn.disabled = true; btn.textContent = "Completed"; attempts[currentDayId] = 2;
            } else {
                attempts[currentDayId]++;
                if (attempts[currentDayId] < 2) { feedback.textContent = "🤔 Not quite. Try again! (Attempt 1 of 2)"; feedback.className = "feedback-box warning"; }
                else { feedback.innerHTML = "❌ Nice try! Here are the correct answers."; feedback.className = "feedback-box info"; revealAnswers(container); btn.disabled = true; btn.textContent = "Completed"; }
            }
        }

        function revealAnswers(container) {
            container.querySelectorAll('input.std-input, input.frac-input').forEach(input => {
                if (input.closest('.mixed-input-group') || input.closest('.fraction-input-group')) return;
                const ans = input.getAttribute('data-answer');
                const displayAns = ans.replace(/\|/g, ' or '); // Display "8 or 9" instead of "8|9"
                if (!input.parentNode.querySelector('.correction-text')) { 
                    const span = document.createElement('span'); 
                    span.className = 'correction-text'; 
                    span.innerText = displayAns; 
                    input.parentNode.appendChild(span); 
                }
            });
            container.querySelectorAll('.mixed-input-group, .fraction-input-group').forEach(group => {
                if (!group.querySelector('.correction-text')) { 
                    const ans = parseFloat(group.getAttribute('data-answer'));
                    let txt = `Val: ${ans}`; 
                    if(ans === 0.75) txt = "3/4"; if(ans === 0.3333) txt = "1/3"; if(ans === 0.4) txt = "2/5"; if(ans === 0.6) txt = "3/5"; if(ans === 0.25) txt = "1/4"; if(ans === 0.5) txt = "1/2";
                    if(ans === 0.625) txt = "5/8"; if(ans === 0.8) txt = "4/5";
                    const span = document.createElement('span'); span.className = 'correction-text'; span.innerText = txt; group.appendChild(span); 
                }
            });
            container.querySelectorAll('tr[data-type="grid-row"]').forEach(row => {
                row.querySelectorAll('input[type="checkbox"]').forEach(box => {
                    if (box.getAttribute('data-correct') === 'true' && !box.parentNode.querySelector('.grid-answer-indicator')) {
                        const div = document.createElement('div'); div.className = 'grid-answer-indicator'; div.innerText = "(Correct)"; box.parentNode.appendChild(div);
                    }
                });
            });
            container.querySelectorAll('table[data-type="match-grid"]').forEach(table => {
                table.querySelectorAll('input[type="checkbox"]').forEach(box => {
                    if (box.getAttribute('data-correct') === 'true' && !box.parentNode.querySelector('.grid-answer-indicator')) {
                        const div = document.createElement('div'); div.className = 'grid-answer-indicator'; div.innerText = "(Correct)"; box.parentNode.appendChild(div); box.checked = true;
                    }
                });
            });
            container.querySelectorAll('.mc-container').forEach(mc => {
                mc.querySelectorAll('input[type="radio"]').forEach(rad => {
                    if (rad.getAttribute('data-correct') === 'true') {
                        rad.parentElement.classList.add('mc-correct-text');
                        rad.checked = true;
                    }
                });
            });
        }

        window.onload = function () { selectModule(0); };
    </script>
</body>
