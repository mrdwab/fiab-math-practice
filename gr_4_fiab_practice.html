        function createPieChart(n, d) {
            const size = 60;
            const r = size / 2;
            const cx = r, cy = r;
            const container = document.createElement('div'); container.className = 'pie-chart-container';
            let svgContent = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
            svgContent += `<circle cx="${cx}" cy="${cy}" r="${r-1}" fill="white" stroke="black" stroke-width="1.5"/>`;
            const step = (Math.PI * 2) / d;
            for (let i = 0; i < d; i++) {
                const startAngle = i * step - (Math.PI / 2);
                const endAngle = (i + 1) * step - (Math.PI / 2);
                const x1 = cx + (r-1) * Math.cos(startAngle);
                const y1 = cy + (r-1) * Math.sin(startAngle);
                const x2 = cx + (r-1) * Math.cos(endAngle);
                const y2 = cy + (r-1) * Math.sin(endAngle);
                const fillColor = i < n ? '#3498db' : 'none';
                const largeArc = step > Math.PI ? 1 : 0;
                svgContent += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r-1} ${r-1} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${fillColor}" stroke="black" stroke-width="1" />`;
            }
            svgContent += `</svg>`;
            container.innerHTML = svgContent;
            return container;
        }

        function createRectModel(rows, cols, shaded, fillMode = 'row') {
            const w = 150, h = 80;
            const cellW = w / cols;
            const cellH = h / rows;
            const container = document.createElement('div'); container.className = 'rect-model-container';
            let svg = `<svg width="${w}" height="${h}" style="border: 2px solid black;">`;
            for(let r=0; r<rows; r++){
                for(let c=0; c<cols; c++){
                    let isShaded = false;
                    if (fillMode === 'col') { if ((c * rows + r) < shaded) isShaded = true; }
                    else { if ((r * cols + c) < shaded) isShaded = true; }
                    const color = isShaded ? '#3498db' : 'white';
                    svg += `<rect x="${c*cellW}" y="${r*cellH}" width="${cellW}" height="${cellH}" fill="${color}" stroke="black" stroke-width="1"/>`;
                }
            }
            svg += `</svg>`;
            container.innerHTML = svg;
            return container;
        }

        function createNumberLine(section) {
            const width = 600; const margin = 40; const range = section.end - section.start; const scale = (width - 2 * margin) / range;
            const step = section.step || 0.1; const targetX = margin + (section.target - section.start) * scale;
            const arrowSize = 10;
            const leftArrow = `<polygon points="${margin},35 ${margin},45 ${margin - arrowSize},40" fill="black" />`;
            const rightArrow = `<polygon points="${width - margin},35 ${width - margin},45 ${width - margin + arrowSize},40" fill="black" />`;
            let ticks = []; const stepCount = Math.round(range / step);
            for (let i = 0; i <= stepCount; i++) {
                let val = section.start + (i * step); val = parseFloat(val.toFixed(2));
                let x = margin + (val - section.start) * scale;
                let isMajor = false;
                if (step === 0.01) { if (i % 5 === 0) isMajor = true; } else { if (Number.isInteger(val) || (range <= 2 && i % 5 === 0)) isMajor = true; }
                let y2 = isMajor ? 60 : 50; let label = '';
                if (isMajor) { label = `<text x="${x}" y="85" text-anchor="middle" font-size="16">${val}</text>`; }
                ticks.push(`<line x1="${x}" y1="40" x2="${x}" y2="${y2}" stroke="black" stroke-width="${isMajor ? 3 : 2}" />${label}`);
            }
            const svgHTML = `
            <div class="number-line-container">
                <svg width="100%" height="100%" viewBox="0 0 ${width} 100" style="background:#fff; border-radius:10px; max-width:${width}px;">
                    <line x1="${margin}" y1="40" x2="${width - margin}" y2="40" stroke="black" stroke-width="3" />
                    ${leftArrow} ${rightArrow} ${ticks.join('')}
                    <circle cx="${targetX}" cy="40" r="6" fill="#e74c3c" />
                    <text x="${targetX}" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c">${section.label}</text>
                </svg>
            </div>
            <div style="text-align:center; margin-top:10px; font-size:18px;">
                ${section.label} = <input type="text" class="std-input" data-answer="${section.ans}">
            </div>`;
            const div = document.createElement('div'); div.innerHTML = svgHTML; return div;
        }

        function createMixedRow(probData) {
            const rowDiv = document.createElement('div'); rowDiv.className = 'math-row';
            probData.segments.forEach(seg => {
                if (seg.type === 'text') { const span = document.createElement('span'); span.innerHTML = seg.val; rowDiv.appendChild(span); }
                else if (seg.type === 'input') { const inp = document.createElement('input'); inp.className = 'std-input'; inp.setAttribute('data-answer', seg.ans); rowDiv.appendChild(inp); }
                else if (seg.type === 'mixed_input') { rowDiv.appendChild(createMixedInput(seg.ans)); }
                else if (seg.type === 'fraction_group') { rowDiv.appendChild(createFractionInputGroup(seg.ans)); }
                else if (seg.type === 'fraction') { rowDiv.appendChild(createFraction(seg)); }
            });
            return rowDiv;
        }

        function createFractionInputGroup(correctValueDecimal) {
            const container = document.createElement('div'); container.className = 'fraction-input-group';
            container.setAttribute('data-answer', correctValueDecimal); container.setAttribute('data-type', 'fraction-check');
            const wrapper = document.createElement('div'); wrapper.className = 'fraction-wrap';
            const top = document.createElement('div'); top.className = 'frac-top';
            const numInp = document.createElement('input'); numInp.className = 'frac-input'; top.appendChild(numInp);
            const bot = document.createElement('div'); bot.className = 'frac-bottom';
            const denInp = document.createElement('input'); denInp.className = 'frac-input'; bot.appendChild(denInp);
            wrapper.appendChild(top); wrapper.appendChild(bot); container.appendChild(wrapper); return container;
        }

        function createMixedInput(correctValueDecimal) {
            const wrapper = document.createElement('div'); wrapper.className = 'mixed-input-group';
            wrapper.setAttribute('data-answer', correctValueDecimal); wrapper.setAttribute('data-type', 'mixed-check');
            const wholeInp = document.createElement('input'); wholeInp.className = 'mixed-whole-input'; wholeInp.placeholder = "W";
            const fracWrap = document.createElement('div'); fracWrap.className = 'fraction-wrap';
            const top = document.createElement('div'); top.className = 'frac-top';
            const numInp = document.createElement('input'); numInp.className = 'frac-input'; top.appendChild(numInp);
            const bot = document.createElement('div'); bot.className = 'frac-bottom';
            const denInp = document.createElement('input'); denInp.className = 'frac-input'; bot.appendChild(denInp);
            fracWrap.appendChild(top); fracWrap.appendChild(bot); wrapper.appendChild(wholeInp); wrapper.appendChild(fracWrap); return wrapper;
        }

        function createFraction(seg) {
            const container = document.createElement('div'); container.className = 'fraction-wrap';
            if (seg.w) {
                const wSpan = document.createElement('span'); wSpan.className = 'whole-part'; wSpan.textContent = seg.w;
                const wrapper = document.createElement('div'); wrapper.className = 'mixed-text-container';
                const innerTop = document.createElement('div'); innerTop.className = 'frac-top'; innerTop.textContent = seg.n;
                const innerBot = document.createElement('div'); innerBot.className = 'frac-bottom'; innerBot.textContent = seg.d;
                container.appendChild(innerTop); container.appendChild(innerBot); wrapper.appendChild(wSpan); wrapper.appendChild(container); return wrapper;
            }
            const top = document.createElement('div'); top.className = 'frac-top';
            if (seg.n === 'box') { const inp = document.createElement('input'); inp.className = 'frac-input'; inp.setAttribute('data-answer', seg.ans || seg.ansN); top.appendChild(inp); }
            else { top.textContent = seg.n; }
            const bot = document.createElement('div'); bot.className = 'frac-bottom';
            if (seg.d === 'box') { const inp = document.createElement('input'); inp.className = 'frac-input'; inp.setAttribute('data-answer', seg.ansD); bot.appendChild(inp); }
            else { bot.textContent = seg.d; }
            container.appendChild(top); container.appendChild(bot); return container;
        }

        function createGrid(section) {
            const table = document.createElement('table'); table.className = 'caaspp-grid';
            const col1Label = section.col1 || 'True';
            const col2Label = section.col2 || 'False';
            
            table.innerHTML = `<tr><th style="width: 50%">Expression</th><th>${col1Label}</th><th>${col2Label}</th></tr>`;
            section.rows.forEach(row => {
                const tr = document.createElement('tr'); tr.setAttribute('data-type', 'grid-row');
                const tdLabel = document.createElement('td');
                if (row.segments) {
                    const mixedCont = document.createElement('div'); mixedCont.className = 'mixed-text-container';
                    row.segments.forEach(seg => {
                        if (seg.type === 'text') { const s = document.createElement('span'); s.innerHTML = seg.val; mixedCont.appendChild(s); }
                        else if (seg.type === 'fraction') { mixedCont.appendChild(createFraction(seg)); }
                    });
                    tdLabel.appendChild(mixedCont);
                } else { tdLabel.innerHTML = row.text; }
                tr.appendChild(tdLabel);
                tr.innerHTML += `<td><input type="checkbox" data-correct="${row.correct}"></td><td><input type="checkbox" data-correct="${!row.correct}"></td>`;
                table.appendChild(tr);
            });
            return table;
        }

        function createMatchGrid(section) {
            const table = document.createElement('table'); table.className = 'match-grid'; table.setAttribute('data-type', 'match-grid');
            const thead = document.createElement('tr');
            const thCorner = document.createElement('th'); thCorner.className = 'corner-cell'; thead.appendChild(thCorner);
            section.colHeaders.forEach(col => {
                const th = document.createElement('th');
                if (col.type === 'pie') { th.appendChild(createPieChart(col.n, col.d)); }
                else if (col.type === 'fraction') { th.appendChild(createFraction(col)); }
                else { th.innerText = col.val; }
                thead.appendChild(th);
            });
            table.appendChild(thead);
            section.rows.forEach((rowData, rIdx) => {
                const tr = document.createElement('tr'); tr.setAttribute('data-row-idx', rIdx);
                const tdLabel = document.createElement('td');
                if (rowData.label.type === 'fraction') tdLabel.appendChild(createFraction(rowData.label)); else tdLabel.innerText = rowData.label.val;
                tr.appendChild(tdLabel);
                rowData.matches.forEach(isMatch => {
                    const td = document.createElement('td');
                    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.setAttribute('data-correct', isMatch);
                    td.appendChild(cb); tr.appendChild(td);
                });
                table.appendChild(tr);
            });
            return table;
        }

        // --- ANSWER KEY GENERATOR ---
        function generateAnswerKey(module) {
            const akContainer = document.getElementById('answer-key-section');
            if (!akContainer) return;
            akContainer.innerHTML = ''; 
            
            const title = document.createElement('h2');
            title.className = 'ak-title';
            title.innerText = "Answer Key: " + module.name;
            akContainer.appendChild(title);

            module.weeks.forEach(week => {
                week.days.forEach(day => {
                    const dayBlock = document.createElement('div');
                    dayBlock.className = 'ak-day-block';
                    
                    const dayTitle = document.createElement('div');
                    dayTitle.className = 'ak-day-title';
                    dayTitle.innerText = day.title;
                    dayBlock.appendChild(dayTitle);
                    
                    const list = document.createElement('ol');
                    list.className = 'ak-list';
                    
                    day.sections.forEach(section => {
                        let answers = [];
                        
                        if (section.type === 'mixed_row' || section.type === 'word_problem' || section.type === 'rect_model_equiv') {
                            const probs = section.problems || [section];
                            probs.forEach(p => {
                                if (p.segments) {
                                    let segAnswers = [];
                                    p.segments.forEach(seg => {
                                        if (seg.ans) {
                                            let a = String(seg.ans).replace(/\|/g, ' or ');
                                            const decimalToFrac = {"0.75":"3/4", "0.3333":"1/3", "0.4":"2/5", "0.6":"3/5", "0.25":"1/4", "0.5":"1/2", "0.625":"5/8", "0.8":"4/5", "1.2":"1 2/10"};
                                            if(decimalToFrac[a]) a = decimalToFrac[a];
                                            segAnswers.push(a);
                                        }
                                    });
                                    if(segAnswers.length > 0) answers.push(segAnswers.join(', '));
                                } else if (p.ans) {
                                    let a = String(p.ans);
                                    const decimalToFrac = {"0.75":"3/4", "0.3333":"1/3", "0.4":"2/5", "0.6":"3/5", "0.25":"1/4", "0.5":"1/2", "0.625":"5/8", "0.8":"4/5"};
                                    if(decimalToFrac[a]) a = decimalToFrac[a];
                                    answers.push(a);
                                }
                            });
                        } else if (section.type === 'grid') {
                            let gridAns = [];
                            section.rows.forEach(r => {
                                gridAns.push(r.correct ? (section.col1 || 'True') : (section.col2 || 'False'));
                            });
                            answers.push(gridAns.join(', '));
                        } else if (section.type === 'matrix_match') {
                            let matchAns = [];
                            section.rows.forEach(r => {
                                r.matches.forEach((m, idx) => {
                                    if (m) {
                                        let col = section.colHeaders[idx];
                                        let cVal = col.type === 'fraction' || col.type === 'pie' ? `${col.n}/${col.d}` : col.val;
                                        let rVal = r.label.type === 'fraction' ? `${r.label.n}/${r.label.d}` : r.label.val;
                                        matchAns.push(`${rVal} → ${cVal}`);
                                    }
                                });
                            });
                            answers.push(matchAns.join(', '));
                        } else if (section.type === 'multiple_choice') {
                            let correctOpt = section.options.find(o => o.correct);
                            if (correctOpt) {
                                let temp = document.createElement('div');
                                temp.innerHTML = correctOpt.text;
                                answers.push(temp.textContent || temp.innerText);
                            }
                        } else if (section.type === 'number_line') {
                            answers.push(section.ans);
                        }
                        
                        if (answers.length > 0) {
                            const li = document.createElement('li');
                            li.innerHTML = answers.join('; ');
                            list.appendChild(li);
                        }
                    });
                    
                    dayBlock.appendChild(list);
                    akContainer.appendChild(dayBlock);
                });
            });
        }

                                card.appendChild(pText); section.problems.forEach(prob => card.appendChild(createMixedRow(prob)));

                            else if (section.type === 'rect_model_equiv') {

                                    const t = document.createElement('div');

                                    t.style.marginTop = '10px';
                                    if(prob.textSegments) {
                                        prob.textSegments.forEach(seg => {
                                            if (seg.type === 'text') { const s = document.createElement('span'); s.innerText = seg.val; t.appendChild(s); }

        function checkAnswers() {
            if (!currentDayId) return;
            const container = document.getElementById(currentDayId);
            let allCorrect = true;

            // Text Inputs (Support multiple answers separated by |)
            container.querySelectorAll('input.std-input, input.frac-input').forEach(input => {
                if (input.closest('.mixed-input-group') || input.closest('.fraction-input-group')) return;
                
                let userVal = input.value.trim(); 
                let correctValStr = input.getAttribute('data-answer');
                let isCorrect = false;

                // Support multiple accepted answers using pipe '|'
                let correctVals = correctValStr.split('|');
                let cleanUserVal = userVal.replace(/,/g, '');

                for (let i = 0; i < correctVals.length; i++) {
                    let cVal = correctVals[i];
                    let cleanCorrectVal = cVal.replace(/,/g, '');

                    const userNum = parseFloat(cleanUserVal);
                    const correctNum = parseFloat(cleanCorrectVal);

                    if (!isNaN(userNum) && !isNaN(correctNum)) {
                        if (Math.abs(userNum - correctNum) < 0.0001) { 
                            isCorrect = true; 
                            break; 
                        }
                    } else {
                        if (userVal === cVal) { 
                            isCorrect = true; 
                            break; 
                        }
                    }
                }

                if (isCorrect) { input.classList.add('correct-bg'); input.classList.remove('incorrect-bg'); }
                else { input.classList.add('incorrect-bg'); input.classList.remove('correct-bg'); allCorrect = false; }
            });

            // Math Fractions
            container.querySelectorAll('.mixed-input-group, .fraction-input-group').forEach(group => {
                const inputs = group.querySelectorAll('input');
                const type = group.getAttribute('data-type');
                const target = parseFloat(group.getAttribute('data-answer'));
                let isCorrect = false;

                if (type === 'equiv-frac') {
                    const n = parseFloat(inputs[0].value);
                    const d = parseFloat(inputs[1].value);
                    if (!isNaN(n) && !isNaN(d) && d !== 0) {
                        const val = n / d;
                        if (Math.abs(val - target) < 0.001) isCorrect = true;
                    }
                } else if (type === 'mixed-check') {
                    const w = parseFloat(inputs[0].value) || 0;
                    const n = parseFloat(inputs[1].value) || 0;
                    const d = parseFloat(inputs[2].value) || 1;
                    const val = w + (n/d);
                    if (Math.abs(val - target) < 0.001) isCorrect = true;
                } else {
                    const n = parseFloat(inputs[0].value) || 0;
                    const d = parseFloat(inputs[1].value) || 1;
                    const val = n/d;
                    if (Math.abs(val - target) < 0.001) isCorrect = true;
                }

                if (isCorrect) inputs.forEach(i => { i.classList.add('correct-bg'); i.classList.remove('incorrect-bg'); });
                else { inputs.forEach(i => { i.classList.add('incorrect-bg'); i.classList.remove('correct-bg'); }); allCorrect = false; }
            });

            // T/F Grids
            container.querySelectorAll('tr[data-type="grid-row"]').forEach(row => {
                const checkboxes = row.querySelectorAll('input[type="checkbox"]');
                const trueBox = checkboxes[0]; const falseBox = checkboxes[1];
                const correctIsFirst = trueBox.getAttribute('data-correct') === 'true';
                let isRowCorrect = false;
                if (correctIsFirst && trueBox.checked && !falseBox.checked) isRowCorrect = true;
                else if (!correctIsFirst && !trueBox.checked && falseBox.checked) isRowCorrect = true;
                const cells = row.querySelectorAll('td');
                if (isRowCorrect) { cells.forEach(td => { td.classList.add('cell-correct'); td.classList.remove('cell-incorrect'); }); }
                else { cells.forEach(td => { td.classList.add('cell-incorrect'); td.classList.remove('cell-correct'); }); allCorrect = false; }
            });

            // Matrix Match
            container.querySelectorAll('table[data-type="match-grid"]').forEach(table => {
                table.querySelectorAll('tr').forEach((row, idx) => {
                    if (idx === 0) return;
                    const checkboxes = row.querySelectorAll('input[type="checkbox"]');
                    checkboxes.forEach(box => {
                        const isCorrectBox = box.getAttribute('data-correct') === 'true';
                        const parentTd = box.parentNode;
                        if (box.checked) {
                            if (isCorrectBox) { parentTd.classList.add('cell-correct'); parentTd.classList.remove('cell-incorrect'); }
                            else { parentTd.classList.add('cell-incorrect'); parentTd.classList.remove('cell-correct'); allCorrect = false; }
                        } else {
                            if (isCorrectBox) { parentTd.classList.add('cell-incorrect'); parentTd.classList.remove('cell-correct'); allCorrect = false; }
                            else { parentTd.classList.remove('cell-correct'); parentTd.classList.remove('cell-incorrect'); }
                        }
                    });
                });
            });

            // Multiple Choice
            container.querySelectorAll('.mc-container').forEach(mc => {
                let isCorrect = false;
                mc.querySelectorAll('.mc-label').forEach(lbl => lbl.classList.remove('mc-correct-text', 'mc-incorrect-text'));
                
                const checked = mc.querySelector('input[type="radio"]:checked');
                if (checked) {
                    if (checked.getAttribute('data-correct') === 'true') {
                        isCorrect = true;
                        checked.parentElement.classList.add('mc-correct-text');
                    } else {
                        checked.parentElement.classList.add('mc-incorrect-text');
                    }
                }
                if (!isCorrect) allCorrect = false;
            });

            const feedback = document.getElementById('feedback-box');
            const btn = document.querySelector('.check-btn');

            if (allCorrect) {
                feedback.textContent = "🎉 PERFECT! Great job!"; feedback.className = "feedback-box correct";
                btn.disabled = true; btn.textContent = "Completed"; attempts[currentDayId] = 2;
            } else {
                attempts[currentDayId]++;
                if (attempts[currentDayId] < 2) { feedback.textContent = "🤔 Not quite. Try again! (Attempt 1 of 2)"; feedback.className = "feedback-box warning"; }
                else { feedback.innerHTML = "❌ Nice try! Here are the correct answers."; feedback.className = "feedback-box info"; revealAnswers(container); btn.disabled = true; btn.textContent = "Completed"; }
            }
        }

        function revealAnswers(container) {
            container.querySelectorAll('input.std-input, input.frac-input').forEach(input => {
                if (input.closest('.mixed-input-group') || input.closest('.fraction-input-group')) return;
                const ans = input.getAttribute('data-answer');
                const displayAns = ans.replace(/\|/g, ' or '); // Display "8 or 9" instead of "8|9"
                if (!input.parentNode.querySelector('.correction-text')) { 
                    const span = document.createElement('span'); 
                    span.className = 'correction-text'; 
                    span.innerText = displayAns; 
                    input.parentNode.appendChild(span); 
                }
            });
            container.querySelectorAll('.mixed-input-group, .fraction-input-group').forEach(group => {
                if (!group.querySelector('.correction-text')) { 
                    const ans = parseFloat(group.getAttribute('data-answer'));
                    let txt = `Val: ${ans}`; 
                    if(ans === 0.75) txt = "3/4"; if(ans === 0.3333) txt = "1/3"; if(ans === 0.4) txt = "2/5"; if(ans === 0.6) txt = "3/5"; if(ans === 0.25) txt = "1/4"; if(ans === 0.5) txt = "1/2";
                    if(ans === 0.625) txt = "5/8"; if(ans === 0.8) txt = "4/5";
                    const span = document.createElement('span'); span.className = 'correction-text'; span.innerText = txt; group.appendChild(span); 
                }
            });
            container.querySelectorAll('tr[data-type="grid-row"]').forEach(row => {
                row.querySelectorAll('input[type="checkbox"]').forEach(box => {
                    if (box.getAttribute('data-correct') === 'true' && !box.parentNode.querySelector('.grid-answer-indicator')) {
                        const div = document.createElement('div'); div.className = 'grid-answer-indicator'; div.innerText = "(Correct)"; box.parentNode.appendChild(div);
                    }
                });
            });
            container.querySelectorAll('table[data-type="match-grid"]').forEach(table => {
                table.querySelectorAll('input[type="checkbox"]').forEach(box => {
                    if (box.getAttribute('data-correct') === 'true' && !box.parentNode.querySelector('.grid-answer-indicator')) {
                        const div = document.createElement('div'); div.className = 'grid-answer-indicator'; div.innerText = "(Correct)"; box.parentNode.appendChild(div); box.checked = true;
                    }
                });
            });
            container.querySelectorAll('.mc-container').forEach(mc => {
                mc.querySelectorAll('input[type="radio"]').forEach(rad => {
                    if (rad.getAttribute('data-correct') === 'true') {
                        rad.parentElement.classList.add('mc-correct-text');
                        rad.checked = true;
                    }
                });
            });
        }

        window.onload = function () { selectModule(0); };
    </script>
</body>
</html>
