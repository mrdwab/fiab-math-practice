<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Grade 5 Math Warmups</title><link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{font-family:'Fredoka','Comic Sans MS',cursive,sans-serif;background-image:linear-gradient(120deg,#f6d365 0%,#fda085 100%);background-attachment:fixed;padding:20px;text-align:center;color:#333;margin:0;-webkit-print-color-adjust:exact}.container{max-width:950px;margin:30px auto;background:#fff;padding:35px;border-radius:30px;box-shadow:0 10px 0 #e67e22,0 20px 30px rgba(0,0,0,.2);border:5px solid #ffeaa7;min-height:700px;position:relative}
/* BUTTONS */
.print-btn{position:absolute;top:20px;right:20px;background-color:#fff;color:#555;border:2px solid #ccc;padding:8px 15px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;transition:all .2s;z-index:100}.print-btn:hover{background-color:#f0f0f0;border-color:#bbb}
.home-btn{position:absolute;top:20px;left:20px;background-color:#fff;color:#555;border:2px solid #ccc;padding:8px 15px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;transition:all .2s;z-index:100;text-decoration:none}.home-btn:hover{background-color:#f0f0f0;border-color:#bbb}

h1{color:#d35400;font-size:36px;margin-bottom:30px;margin-top:10px;text-shadow:2px 2px 0 #fad390}h3.screen-header{color:#555;font-size:28px;margin-bottom:25px;border-bottom:2px dashed #ffeaa7;padding-bottom:10px;text-align:left}.fraction-wrap{display:inline-block;vertical-align:middle;text-align:center;margin:0 2px;font-size:1em;font-weight:700}.frac-top{border-bottom:2px solid #333;display:block;padding:0 2px;margin-bottom:1px;min-width:15px}.frac-bottom{display:block;padding:0 2px;min-width:15px}.whole-part{display:inline-block;margin-right:3px;font-size:1.1em;vertical-align:middle}.mixed-text-container{display:inline;line-height:2.5}.fraction-input-group,.mixed-input-group,.whole-input-group{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;background:#fff9e6;padding:5px 8px;border-radius:10px;border:1px dashed #ffd54f;margin:0 5px}.mixed-input-group{flex-direction:row}.whole-input-group{flex-direction:row;padding:8px}
/* HIDE SPINNERS */
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
/* WIDER INPUTS */
.frac-input,.mixed-whole-input,.whole-input{width:55px;padding:4px;font-family:inherit;font-size:18px;text-align:center;border:2px solid #ffab00;border-radius:6px;background-color:#fffcf2;outline:0}.whole-input{width:80px}.mixed-whole-input{width:50px;margin-right:5px;border-radius:8px}.frac-line{border-top:2px solid #333;width:100%;margin:2px 0;height:1px}.mixed-frac-container{display:flex;flex-direction:column;align-items:center}.visual-container{display:flex;justify-content:center;flex-wrap:wrap;gap:30px;margin:20px 0;padding:10px;background:#fff;border-radius:15px;border:2px solid #eee}.visual-item{display:flex;flex-direction:column;align-items:center}.visual-label{font-weight:700;margin-bottom:8px;color:#555;font-size:16px}.module-nav{display:flex;justify-content:center;gap:10px;margin-bottom:30px;flex-wrap:wrap;border-bottom:2px solid #eee;padding-bottom:20px}.btn-module{background-color:#e67e22;color:#fff;border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;box-shadow:0 5px 0 #d35400,0 10px 10px rgba(0,0,0,.1);transition:all .2s;flex:1 1 140px;max-width:180px}.btn-module.active{background-color:#d35400;transform:translateY(4px);box-shadow:0 1px 0 #a04000;border:2px solid #e17055}.nav-container{display:flex;flex-direction:column;gap:20px;margin-bottom:40px}.week-row{display:flex;justify-content:center;gap:15px;flex-wrap:wrap}.week-label{width:100%;color:#e67e22;font-weight:700;font-size:18px;margin-bottom:5px;text-transform:uppercase}.nav-btn{background-color:#fff0d6;border:3px solid #f39c12;border-radius:15px;padding:10px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;min-width:80px;height:50px;font-family:inherit;font-size:18px;font-weight:700;color:#d35400}.nav-btn.active{background-color:#e67e22;color:#fff;border-color:#d35400;box-shadow:0 5px 15px rgba(230,126,34,.4)}.question-card{background:#fff8e1;padding:25px;margin-bottom:25px;border-radius:20px;text-align:left;border-left:8px solid #ffab00;box-shadow:0 4px 10px rgba(0,0,0,.05);break-inside:avoid}.instructions{font-size:18px;color:#444;margin-bottom:20px;font-style:italic;display:block;line-height:1.5}.mc-container{display:flex;flex-direction:column;gap:12px}.mc-option{display:flex;align-items:center;gap:15px;background:#fff;padding:15px;border:2px solid #ffeaa7;border-radius:10px;cursor:pointer;transition:.2s;min-height:50px}.mc-option:hover{border-color:#ffab00;background:#fffcf2}.mc-option input[type=radio],.mc-option input[type=checkbox]{transform:scale(1.5);accent-color:#e67e22;margin-right:10px}.mc-content{font-size:18px;color:#333;display:flex;align-items:center;flex-wrap:wrap;gap:5px}.math-row{font-size:22px;font-weight:600;margin-bottom:25px;color:#444;display:flex;align-items:center;flex-wrap:wrap;gap:5px}.correct-bg{background-color:#e8f5e9!important;border-color:#2e7d32!important;color:#2e7d32!important}.incorrect-bg{background-color:#ffebee!important;border-color:#c62828!important}.correction-text{color:#27ae60;font-weight:700;font-size:16px;background:#e8f5e9;padding:4px 10px;border-radius:8px;margin-left:auto}.footer-controls{margin-top:40px;padding-top:20px;border-top:2px dashed #ffeaa7;display:flex;flex-direction:column;align-items:center;gap:20px}.check-btn{background-color:#00c853;color:#fff;font-family:inherit;padding:15px 50px;border:none;border-radius:50px;font-size:24px;font-weight:600;cursor:pointer;box-shadow:0 8px 0 #009624,0 15px 20px rgba(0,0,0,.2);transition:all .1s}.check-btn:hover{background-color:#00e676;transform:translateY(2px)}.check-btn:active{transform:translateY(6px);box-shadow:0 2px 0 #009624,0 5px 10px rgba(0,0,0,.2)}.feedback-box{font-size:20px;font-weight:700;padding:15px;border-radius:15px;width:100%;max-width:600px;display:none}.feedback-box.correct{display:block;background-color:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}.feedback-box.warning{display:block;background-color:#fff3e0;color:#ef6c00;border:2px solid #ffcc80}.tbd-message{background:#fff;border:3px dashed #ccc;padding:50px;border-radius:20px;color:#777;font-size:24px;margin-top:30px}#print-area{display:none}

/* VISUAL BOX STYLE */
.math-square-box { display: inline-block; width: 24px; height: 24px; border: 2px solid #333; background: #fff; margin: 0 5px; vertical-align: middle; }

/* --- PRINT STYLES (LANDSCAPE, 2-COLUMN COMPACT) --- */
@media print {
    @page { size: landscape; margin: 0.4in; }
    body { background: none; background-color: white; color: black; padding: 0; margin: 0; width: 100%; zoom: 0.88; }
    .container { display: none !important; }
    #print-area { display: block !important; width: 100%; padding: 0; margin: 0; }
    
    input::placeholder { color: transparent !important; }
    input::-webkit-input-placeholder { color: transparent !important; }
    input::-moz-placeholder { color: transparent !important; }
    input:-ms-input-placeholder { color: transparent !important; }
    
    .print-week-wrap { display: grid; grid-template-columns: 1fr 1fr; grid-gap: 20px; page-break-after: always; width: 100%; margin-bottom: 10px; }
    .print-week-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 8px; }
    .print-day-card { border: 2px solid #444; border-radius: 12px; padding: 10px; background: #fff; break-inside: avoid; page-break-inside: avoid; height: fit-content; }
    .print-day-title { font-size: 18px; font-weight: bold; border-bottom: 1px dashed #ccc; margin-bottom: 8px; padding-bottom: 2px; color: #000; }
    .question-card { border: none; box-shadow: none; background: none; border-left: 3px solid #ccc; border-radius: 0; padding: 4px 8px; margin-bottom: 8px; }
    .instructions { margin-bottom: 4px; font-size: 16px; }
    .frac-input, .mixed-whole-input, .whole-input { border: 1px solid #000; background-color: white; color: transparent; text-shadow: none; }
    .mc-container { gap: 3px; }
    .mc-option { border: 1px solid #aaa; padding: 4px 8px; min-height: auto; font-size: 16px; }
    .mc-option input { transform: scale(1.1); margin-right: 5px; }
    .visual-container { border: 1px solid #ccc; background: none; margin: 5px 0; padding: 5px; gap: 10px; }
    svg { transform: scale(0.9); transform-origin: left center; margin-bottom: -10px; }
    .correction-text { display: none !important; }
    .correct-bg, .incorrect-bg { background-color: white !important; }
}
</style>
</head>
<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠 Home</a>
    <button class="print-btn" onclick="printAllModule()">🖨️ Print Worksheet</button>

    <h1>Grade 5 Math Warmups</h1>

    <div class="module-nav">
        <button class="btn-module" onclick="selectModule(0)">Add/Sub Equiv Fractions</button>
        <button class="btn-module" onclick="selectModule(1)">Mult/Div Fractions I</button>
        <button class="btn-module" onclick="selectModule(2)">Review: Fractions & Ops</button>
        <button class="btn-module" onclick="selectModule(3)">Mult/Div Fractions II</button>
        <button class="btn-module" onclick="selectModule(4)">Volume Concepts</button>
        <button class="btn-module" onclick="selectModule(5)">Place Value Systems</button>
    </div>

    <div class="nav-container" id="navContainer"></div>

    <div id="content-area"></div>
    
    <div class="footer-controls" id="footer-controls" style="display:none;">
        <div id="feedback-box" class="feedback-box"></div>
        <button class="check-btn" onclick="checkAnswers()">Check Answers</button>
    </div>
</div>

<div id="print-area"></div>

<script src="data/gr5/mod1.js"></script>
<script src="data/gr5/mod2.js"></script>
<script src="data/gr5/rev1.js"></script>
<script src="data/gr5/mod3.js"></script>
<script src="data/gr5/mod4.js"></script>

<script>
    // COMBINE MODULES
    const appData = {
        modules: [
            typeof module1 !== 'undefined' ? module1 : { id: "m1", name: "Module 1 (Missing)", weeks: [] },
            typeof module2 !== 'undefined' ? module2 : { id: "m2", name: "Module 2 (Missing)", weeks: [] },
            typeof reviewModule !== 'undefined' ? reviewModule : { id: "rev", name: "Review (Missing)", weeks: [] },
            typeof module3 !== 'undefined' ? module3 : { id: "m3", name: "Module 3 (Missing)", weeks: [] },
            typeof module4 !== 'undefined' ? module4 : { id: "m4", name: "Module 4 (Missing)", weeks: [] },
            { id: "mod-5", name: "Place Value Systems", weeks: [] },
            { id: "mod-6", name: "Numerical Expressions", weeks: [] }
        ]
    };

    const dayMap = { "Mon": "Monday", "Tue": "Tuesday", "Wed": "Wednesday", "Thu": "Thursday", "Fri": "Friday" };

    // --- VISUAL GENERATORS ---

    // 1. LAYER OF CUBES GENERATOR
    function renderBlockLayer(cols, rows, color="#e0e0e0") {
        let svg = `<svg width="220" height="130" style="overflow:visible; margin: 10px 0;">`;
        const startX = 40;
        const startY = 100; 
        const dx = 20; 
        const dy = 20; 
        const sx = 12; 
        const sy = -12; 

        // Draw top face grid (back to front to handle overlaps nicely)
        for (let j = rows - 1; j >= 0; j--) {
            for (let i = 0; i < cols; i++) {
                let px = startX + i*dx + j*sx;
                let py = startY - dy + j*sy;
                svg += `<polygon points="${px},${py} ${px+dx},${py} ${px+dx+sx},${py+sy} ${px+sx},${py+sy}" fill="${color}" stroke="#333" stroke-width="1.5" stroke-linejoin="round" />`;
            }
        }
        
        // Draw front face grid
        for (let i = 0; i < cols; i++) {
            let px = startX + i*dx;
            let py = startY;
            svg += `<polygon points="${px},${py} ${px+dx},${py} ${px+dx},${py-dy} ${px},${py-dy}" fill="${color}" stroke="#333" stroke-width="1.5" stroke-linejoin="round" />`;
        }

        // Draw right face grid
        for (let j = 0; j < rows; j++) {
            let px = startX + cols*dx + j*sx;
            let py = startY + j*sy;
            svg += `<polygon points="${px},${py} ${px+sx},${py+sy} ${px+sx},${py+sy-dy} ${px},${py-dy}" fill="${color}" stroke="#333" stroke-width="1.5" stroke-linejoin="round" />`;
        }

        svg += `</svg>`;
        return svg;
    }
    
    // 2. COMPOSITE PRISM GENERATOR (Labels 'A' and 'B')
    function renderComposite(type, nameA="A", nameB="B", colorA="#e0e0e0", colorB="#f9f9f9") {
        let svg = `<svg width="240" height="150" style="overflow:visible; margin: 10px 0;">`;
        const F_MAIN = 'font-family="Fredoka" font-weight="bold" font-size="24" fill="#555"';
        
        if (type === 'stacked') {
            // Base Prism (Color A)
            svg += `<polygon points="30,90 60,60 180,60 150,90" fill="${colorA}" stroke="black" stroke-width="2" />`; // Top
            svg += `<polygon points="30,90 150,90 150,130 30,130" fill="${colorA}" stroke="black" stroke-width="2" />`; // Front
            svg += `<polygon points="150,90 180,60 180,100 150,130" fill="${colorA}" stroke="black" stroke-width="2" />`; // Right
            // Top Prism (Color B)
            svg += `<polygon points="30,50 60,20 120,20 90,50" fill="${colorB}" stroke="black" stroke-width="2" />`; // Top
            svg += `<polygon points="30,50 90,50 90,90 30,90" fill="${colorB}" stroke="black" stroke-width="2" />`; // Front
            svg += `<polygon points="90,50 120,20 120,60 90,90" fill="${colorB}" stroke="black" stroke-width="2" />`; // Right
            
            // Large Letter Identifiers
            svg += `<text x="90" y="118" text-anchor="middle" ${F_MAIN}>${nameA}</text>`;
            svg += `<text x="60" y="78" text-anchor="middle" ${F_MAIN}>${nameB}</text>`;
            
        } else if (type === 'side_by_side') {
            // Left Prism (Color A)
            svg += `<polygon points="30,60 50,40 100,40 80,60" fill="${colorA}" stroke="black" stroke-width="2" />`; // Top
            svg += `<polygon points="30,60 80,60 80,130 30,130" fill="${colorA}" stroke="black" stroke-width="2" />`; // Front
            svg += `<polygon points="80,60 100,40 100,110 80,130" fill="${colorA}" stroke="black" stroke-width="2" />`; // Right
            // Right Prism (Color B)
            svg += `<polygon points="80,90 100,70 160,70 140,90" fill="${colorB}" stroke="black" stroke-width="2" />`; // Top
            svg += `<polygon points="80,90 140,90 140,130 80,130" fill="${colorB}" stroke="black" stroke-width="2" />`; // Front
            svg += `<polygon points="140,90 160,70 160,110 140,130" fill="${colorB}" stroke="black" stroke-width="2" />`; // Right
            
            // Large Letter Identifiers
            svg += `<text x="55" y="103" text-anchor="middle" ${F_MAIN}>${nameA}</text>`;
            svg += `<text x="110" y="118" text-anchor="middle" ${F_MAIN}>${nameB}</text>`;
        }
        svg += `</svg>`;
        return svg;
    }

    // 3. STANDARD PRISM GENERATOR
    function renderPrism(lLabel, wLabel, hLabel, bLabel, color="#fff") {
        let svg = `<svg width="220" height="150" style="overflow:visible; margin: 10px 0;">`;
        const F_MAIN = 'font-family="Fredoka" font-weight="bold" font-size="14"';
        
        svg += `<polygon points="30,60 70,30 170,30 130,60" fill="${color}" stroke="black" stroke-width="2" />`; // Top
        svg += `<polygon points="30,60 130,60 130,120 30,120" fill="${color}" stroke="black" stroke-width="2" />`; // Front
        svg += `<polygon points="130,60 170,30 170,90 130,120" fill="${color}" stroke="black" stroke-width="2" />`; // Right
        
        if (hLabel) svg += `<text x="25" y="95" text-anchor="end" ${F_MAIN}>${hLabel}</text>`;
        if (lLabel) svg += `<text x="80" y="140" text-anchor="middle" ${F_MAIN}>${lLabel}</text>`;
        if (wLabel) svg += `<text x="155" y="115" text-anchor="start" ${F_MAIN}>${wLabel}</text>`;
        
        if (bLabel) {
            svg += `<text x="80" y="85" text-anchor="middle" ${F_MAIN}>Base Area =</text>`;
            svg += `<text x="80" y="105" text-anchor="middle" ${F_MAIN}>${bLabel}</text>`;
        }
        svg += `</svg>`; return svg;
    }

    // 4. RECTANGLE GENERATOR
    function renderRectangle(wLabel, hLabel, color="#fff") {
        function buildLabel(str) {
            let svg = ""; const parts = str.split(' '); 
            let isMixed = parts.length === 3 && parts[1].includes('/');
            let isFrac = parts.length === 2 && parts[0].includes('/');
            const F_MAIN = 'font-family="Fredoka" font-weight="bold"';
            
            if (isMixed) {
                let [w, frac, unit] = parts; let [n, d] = frac.split('/');
                svg += `<text x="-24" y="5" text-anchor="end" font-size="16" ${F_MAIN}>${w}</text>`; 
                svg += `<text x="-12" y="-6" text-anchor="middle" font-size="12" ${F_MAIN}>${n}</text>`;
                svg += `<line x1="-20" y1="0" x2="-4" y2="0" stroke="black" stroke-width="1.5" />`;
                svg += `<text x="-12" y="11" text-anchor="middle" font-size="12" ${F_MAIN}>${d}</text>`;
                svg += `<text x="4" y="5" text-anchor="start" font-size="14" ${F_MAIN}>${unit}</text>`;
            } else if (isFrac) {
                let [frac, unit] = parts; let [n, d] = frac.split('/');
                svg += `<text x="-10" y="-6" text-anchor="middle" font-size="12" ${F_MAIN}>${n}</text>`;
                svg += `<line x1="-18" y1="0" x2="-2" y2="0" stroke="black" stroke-width="1.5" />`;
                svg += `<text x="-10" y="11" text-anchor="middle" font-size="12" ${F_MAIN}>${d}</text>`;
                svg += `<text x="4" y="5" text-anchor="start" font-size="14" ${F_MAIN}>${unit}</text>`;
            } else {
                svg += `<text x="0" y="5" text-anchor="middle" font-size="16" ${F_MAIN}>${str}</text>`;
            }
            return svg;
        }
        let svg = `<svg width="220" height="150" style="overflow:visible">`;
        svg += `<g transform="translate(110, 25)">${buildLabel(wLabel)}</g>`;
        svg += `<g transform="translate(25, 90) rotate(-90)">${buildLabel(hLabel)}</g>`;
        svg += `<rect x="45" y="40" width="130" height="100" fill="${color}" stroke="black" stroke-width="2" />`;
        svg += `</svg>`; return svg;
    }

    // --- STATE ---
    let currentModuleIndex = 4; // Defaulting to module 4
    let currentWeekIndex = 0; let currentDayIndex = 0; let currentAttempts = 0;

    function renderFraction(n, d) { return `<div class="fraction-wrap"><span class="frac-top">${n}</span><span class="frac-bottom">${d}</span></div>`; }
    function renderSegment(seg) {
        if (seg.type === 'text') return `<div class="mixed-text-container">${seg.val}</div>`;
        if (seg.type === 'break') return `<div style="width:100%; height: 5px;"></div>`; 
        if (seg.type === 'fraction') return renderFraction(seg.n, seg.d);
        if (seg.type === 'mixed') return `<div class="whole-part">${seg.w}</div>` + renderFraction(seg.n, seg.d);
        if (seg.type === 'box') return `<div class="math-square-box"></div>`;
        if (seg.type === 'fraction_group') return `<div class="fraction-input-group" data-answer="${seg.ans}"><input type="number" class="frac-input" placeholder="n"><div class="frac-line"></div><input type="number" class="frac-input" placeholder="d"></div>`;
        if (seg.type === 'mixed_group') return `<div class="mixed-input-group" data-answer="${seg.ans}"><input type="number" class="mixed-whole-input" placeholder="#"><div class="mixed-frac-container"><input type="number" class="frac-input" placeholder="n"><div class="frac-line"></div><input type="number" class="frac-input" placeholder="d"></div></div>`;
        if (seg.type === 'whole_number') return `<div class="whole-input-group" data-answer="${seg.ans}"><input type="number" class="whole-input" placeholder="#"></div>`;
        return '';
    }

    function renderSection(section, index) {
        let html = `<div class="question-card">`;
        html += `<div class="instructions"><span style="margin-right:5px; font-weight:bold;">${index + 1}.</span>`;
        if (Array.isArray(section.instruction)) { section.instruction.forEach(seg => html += renderSegment(seg)); } else { html += `<span>${section.instruction}</span>`; }
        if (section.instructionMath) { section.instructionMath.forEach(seg => html += renderSegment(seg)); }
        html += `</div>`;

        if (section.type === 'mixed_row' || section.type === 'visual_problem' || section.type === 'number_line') {
            if (section.type === 'visual_problem') {
                html += `<div class="visual-container">`;
                section.models.forEach(m => {
                    if (m.type === 'composite') html += renderComposite(m.compType, m.nameA, m.nameB, m.colorA, m.colorB);
                    else if (m.type === 'block_layer') html += renderBlockLayer(m.cols, m.rows, m.color);
                    else if (m.type === 'rectangle') html += renderRectangle(m.wLabel, m.hLabel, m.color);
                    else if (m.type === 'prism') html += renderPrism(m.lLabel, m.wLabel, m.hLabel, m.bLabel, m.color);
                });
                html += `</div>`;
            } else if (section.type === 'number_line') {
                html += `<div class="visual-container" style="border:none; background:none;">${renderNumberLine(section.min, section.max, section.step, section.points)}</div>`;
            }
            section.problems.forEach(prob => {
                html += `<div class="math-row" style="justify-content:center;">`;
                prob.segments.forEach(seg => html += renderSegment(seg));
                html += `</div>`;
            });
        }
        else if (section.type === 'multiple_choice') {
            html += `<div class="mc-container">`;
            const inputType = section.select_all ? 'checkbox' : 'radio';
            
            section.options.forEach((opt, idx) => {
                const warningAttr = opt.warning ? `data-warning="${opt.warning}"` : '';
                html += `<label class="mc-option" data-correct="${opt.correct}" ${warningAttr}>
                    <input type="${inputType}" name="mc_q_${index}" value="${idx}">
                    <div class="mc-content">`;
                    opt.content.forEach(seg => html += renderSegment(seg));
                html += `</div></label>`;
            });
            html += `<div class="correction-text" style="display:none;"></div></div>`;
        }
        html += `</div>`;
        return html;
    }

    function renderDay() {
        const module = appData.modules[currentModuleIndex];
        currentAttempts = 0;
        if (!module.weeks || module.weeks.length === 0) {
            document.getElementById('content-area').innerHTML = `<div class="tbd-message">🚧 Content for <strong>${module.name}</strong> is coming soon! 🚧</div>`;
            document.getElementById('navContainer').innerHTML = ''; document.getElementById('footer-controls').style.display = 'none'; return;
        }
        const week = module.weeks[currentWeekIndex]; const day = week.days[currentDayIndex]; const dayFullName = dayMap[day.name] || day.name;
        let navHtml = '';
        module.weeks.forEach((w, wIdx) => {
            navHtml += `<div class="week-label">Week ${w.weekNum}</div><div class="week-row">`;
            w.days.forEach((d, dIdx) => {
                const active = (wIdx === currentWeekIndex && dIdx === currentDayIndex) ? 'active' : '';
                navHtml += `<button class="nav-btn ${active}" onclick="selectDay(${wIdx}, ${dIdx})">${d.name}</button>`;
            });
            navHtml += `</div>`;
        });
        document.getElementById('navContainer').innerHTML = navHtml;
        let contentHtml = `<div class="day-content"><h3 class="screen-header">Week ${week.weekNum}: ${dayFullName}</h3>`;
        day.sections.forEach((sec, idx) => { contentHtml += renderSection(sec, idx); });
        contentHtml += `</div>`;
        document.getElementById('content-area').innerHTML = contentHtml;
        document.getElementById('footer-controls').style.display = 'flex';
        document.getElementById('feedback-box').style.display = 'none';
        
        // Reset Inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(i => {
            i.disabled = false;
            if(i.type === 'text' || i.type === 'number') {
                i.parentElement.classList.remove('correct-bg', 'incorrect-bg');
            } else {
                i.checked = false;
                i.parentElement.style.border = "2px solid #ffeaa7";
                i.parentElement.classList.remove('correct-bg', 'incorrect-bg');
            }
        });
        document.querySelectorAll('.correction-text').forEach(f => f.style.display = 'none');
    }

    function selectModule(idx) { currentModuleIndex = idx; currentWeekIndex = 0; currentDayIndex = 0; renderDay(); updateBtns(idx); }
    function selectDay(wIdx, dIdx) { currentWeekIndex = wIdx; currentDayIndex = dIdx; renderDay(); }
    function updateBtns(idx) { document.querySelectorAll('.btn-module').forEach((b, i) => { if(i===idx) b.classList.add('active'); else b.classList.remove('active'); }); }

    function checkAnswers() {
        currentAttempts++; let correctCount = 0; let totalCount = 0;
        
        // Frac Groups
        document.querySelectorAll('.fraction-input-group').forEach(group => {
            if(group.closest('.mixed-input-group')) return;
            totalCount++;
            const inputs = group.querySelectorAll('input'); const n = parseFloat(inputs[0].value); const d = parseFloat(inputs[1].value);
            const target = parseFloat(group.getAttribute('data-answer'));
            let isCorrect = (!isNaN(n) && !isNaN(d) && d!==0 && Math.abs((n/d)-target) < 0.001);
            if(isCorrect) { group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; }
            else { group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); }
        });
        // Mixed Groups
        document.querySelectorAll('.mixed-input-group').forEach(group => {
            totalCount++;
            const w = parseFloat(group.querySelector('.mixed-whole-input').value)||0;
            const n = parseFloat(group.querySelector('.frac-input:nth-of-type(1)').value)||0;
            const d = parseFloat(group.querySelector('.frac-input:nth-of-type(2)').value)||1;
            const target = parseFloat(group.getAttribute('data-answer'));
            if(Math.abs((w+(n/d))-target) < 0.001) { group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; }
            else { group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); }
        });
        // Whole Number Groups
        document.querySelectorAll('.whole-input-group').forEach(group => {
            totalCount++;
            const val = parseFloat(group.querySelector('.whole-input').value);
            const target = parseFloat(group.getAttribute('data-answer'));
            if(!isNaN(val) && Math.abs(val - target) < 0.001) { group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; }
            else { group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); }
        });
        
        // MC & Checkboxes
        document.querySelectorAll('.mc-container').forEach(container => {
            totalCount++; 
            const options = container.querySelectorAll('.mc-option');
            const isCheckbox = options[0].querySelector('input').type === 'checkbox';
            
            let isCorrectGroup = false;
            
            if (isCheckbox) {
                // Strict grading for checkboxes: All correct options checked, no incorrect ones checked
                let allCorrectChecked = true;
                let noIncorrectChecked = true;
                
                options.forEach(opt => {
                    const checked = opt.querySelector('input').checked;
                    const correct = opt.getAttribute('data-correct') === 'true';
                    if (correct && !checked) allCorrectChecked = false;
                    if (!correct && checked) noIncorrectChecked = false;
                });
                isCorrectGroup = allCorrectChecked && noIncorrectChecked;
            } else {
                // Standard Radio Button logic
                options.forEach(opt => {
                    if(opt.querySelector('input').checked && opt.getAttribute('data-correct')==='true') isCorrectGroup = true;
                });
            }
            
            const feedback = container.querySelector('.correction-text');
            feedback.style.display = "inline-block";
            let warningMsg = "";
            
            options.forEach(opt => {
                const checked = opt.querySelector('input').checked;
                const isCorrect = opt.getAttribute('data-correct') === 'true';
                const warning = opt.getAttribute('data-warning');
                
                opt.style.border = "2px solid #ffeaa7"; 
                opt.classList.remove('correct-bg','incorrect-bg');
                
                if(checked) {
                    if(isCorrect) opt.classList.add('correct-bg');
                    else {
                        opt.classList.add('incorrect-bg');
                        if(warning) warningMsg = warning;
                    }
                }
                
                // Reveal logic (Show correct answers if correct or attempts > 2)
                if(isCorrect && (isCorrectGroup || currentAttempts >= 2)) {
                    opt.style.border = "2px solid #27ae60";
                }
            });

            if(isCorrectGroup) {
                correctCount++; feedback.innerHTML = "Correct!"; feedback.className = "correction-text correct-bg";
                feedback.style.backgroundColor="#e8f5e9"; feedback.style.color="#2e7d32";
            } else {
                if(warningMsg) {
                    feedback.innerHTML = warningMsg;
                    feedback.style.backgroundColor = "#fff3e0"; feedback.style.color = "#e67e22";
                } else if(currentAttempts < 2) {
                    feedback.innerHTML = "Try Again";
                    feedback.style.backgroundColor = "#fadbd8"; feedback.style.color = "#c0392b";
                } else {
                    feedback.innerHTML = "Solution Shown";
                    feedback.style.backgroundColor = "#fff3e0"; feedback.style.color = "#e67e22";
                }
            }
        });

        const fbBox = document.getElementById('feedback-box'); fbBox.style.display = 'block';
        if(correctCount === totalCount && totalCount > 0) { fbBox.className = 'feedback-box correct'; fbBox.innerHTML = "🌟 Amazing! You got everything correct! 🌟"; }
        else { fbBox.className = 'feedback-box warning'; fbBox.innerHTML = `You got ${correctCount} out of ${totalCount} correct. ${currentAttempts < 2 ? 'Try again!' : 'Review the solutions.'}`; }
    }

    // --- UPDATED PRINT LOGIC ---
    function printAllModule() {
        const module = appData.modules[currentModuleIndex];
        if (!module.weeks || module.weeks.length === 0) { alert("No content to print."); return; }
        
        let fullHtml = ``;
        
        module.weeks.forEach((week, wIdx) => {
            // New Grid Container for EACH WEEK to handle page breaks properly
            fullHtml += `<div class="print-week-wrap">`;
            
            // Header (Spans 2 columns)
            fullHtml += `
            <div class="print-week-header">
                <div style="font-size: 24px; font-weight: bold;">Week ${week.weekNum}</div>
                <div style="display: flex; gap: 50px; font-size: 18px;">
                    <span>Name: __________________________</span>
                    <span>Date: __________________</span>
                </div>
            </div>`;
            
            // Day Cards
            week.days.forEach(day => {
                const dayName = dayMap[day.name] || day.name;
                fullHtml += `<div class="print-day-card">
                    <div class="print-day-title">${dayName}</div>`;
                
                day.sections.forEach((sec, idx) => {
                    fullHtml += renderSection(sec, idx);
                });
                
                fullHtml += `</div>`;
            });
            
            fullHtml += `</div>`; // Close Grid
        });

        document.getElementById('print-area').innerHTML = fullHtml;
        window.print();
    }

    // Init
    selectModule(4);
</script>
