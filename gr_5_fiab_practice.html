<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Grade 5 Math Warmups</title><link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{font-family:'Fredoka','Comic Sans MS',cursive,sans-serif;background-image:linear-gradient(120deg,#f6d365 0%,#fda085 100%);background-attachment:fixed;padding:20px;text-align:center;color:#333;margin:0;-webkit-print-color-adjust:exact}.container{max-width:950px;margin:30px auto;background:#fff;padding:35px;border-radius:30px;box-shadow:0 10px 0 #e67e22,0 20px 30px rgba(0,0,0,.2);border:5px solid #ffeaa7;min-height:700px;position:relative}
/* BUTTONS */
.print-btn{position:absolute;top:20px;right:20px;background-color:#fff;color:#555;border:2px solid #ccc;padding:8px 15px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;transition:all .2s;z-index:100}.print-btn:hover{background-color:#f0f0f0;border-color:#bbb}
.home-btn{position:absolute;top:20px;left:20px;background-color:#fff;color:#555;border:2px solid #ccc;padding:8px 15px;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;display:flex;align-items:center;gap:5px;transition:all .2s;z-index:100;text-decoration:none}.home-btn:hover{background-color:#f0f0f0;border-color:#bbb}

h1{color:#d35400;font-size:36px;margin-bottom:30px;margin-top:10px;text-shadow:2px 2px 0 #fad390}h3.screen-header{color:#555;font-size:28px;margin-bottom:25px;border-bottom:2px dashed #ffeaa7;padding-bottom:10px;text-align:left}.fraction-wrap{display:inline-block;vertical-align:middle;text-align:center;margin:0 2px;font-size:1em;font-weight:700}.frac-top{border-bottom:2px solid #333;display:block;padding:0 2px;margin-bottom:1px;min-width:15px}.frac-bottom{display:block;padding:0 2px;min-width:15px}.whole-part{display:inline-block;margin-right:3px;font-size:1.1em;vertical-align:middle}.mixed-text-container{display:inline;line-height:2.5}.fraction-input-group,.mixed-input-group,.whole-input-group,.expression-input-group{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;background:#fff9e6;padding:5px 8px;border-radius:10px;border:1px dashed #ffd54f;margin:0 5px}.mixed-input-group{flex-direction:row}.whole-input-group{flex-direction:row;padding:8px}
/* HIDE SPINNERS */
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
/* INPUTS */
.frac-input,.mixed-whole-input,.whole-input,.expr-input{width:55px;padding:4px;font-family:inherit;font-size:18px;text-align:center;border:2px solid #ffab00;border-radius:6px;background-color:#fffcf2;outline:0}.whole-input{width:80px}.mixed-whole-input{width:50px;margin-right:5px;border-radius:8px}.frac-line{border-top:2px solid #333;width:100%;margin:2px 0;height:1px}.mixed-frac-container{display:flex;flex-direction:column;align-items:center}.visual-container{display:flex;justify-content:center;flex-wrap:wrap;gap:30px;margin:20px 0;padding:10px;background:#fff;border-radius:15px;border:2px solid #eee}.visual-item{display:flex;flex-direction:column;align-items:center}.visual-label{font-weight:700;margin-bottom:8px;color:#555;font-size:16px}
/* EXPRESSION INPUT UI */
.expr-input{width:220px;text-align:left;padding:8px 12px;font-weight:600;letter-spacing:1px}.expr-toolbar{display:flex;gap:5px;margin-top:6px}.btn-math{background:#e67e22;color:#fff;border:none;border-radius:6px;width:30px;height:30px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;transition:0.1s}.btn-math:hover{background:#d35400;transform:translateY(-2px)}.btn-math:active{transform:translateY(1px)}
/* NAV & LAYOUT */
.module-nav{display:flex;justify-content:center;gap:10px;margin-bottom:30px;flex-wrap:wrap;border-bottom:2px solid #eee;padding-bottom:20px}.btn-module{background-color:#e67e22;color:#fff;border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;box-shadow:0 5px 0 #d35400,0 10px 10px rgba(0,0,0,.1);transition:all .2s;flex:1 1 140px;max-width:180px}.btn-module.active{background-color:#d35400;transform:translateY(4px);box-shadow:0 1px 0 #a04000;border:2px solid #e17055}.nav-container{display:flex;flex-direction:column;gap:20px;margin-bottom:40px}.week-row{display:flex;justify-content:center;gap:15px;flex-wrap:wrap}.week-label{width:100%;color:#e67e22;font-weight:700;font-size:18px;margin-bottom:5px;text-transform:uppercase}.nav-btn{background-color:#fff0d6;border:3px solid #f39c12;border-radius:15px;padding:10px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;min-width:80px;height:50px;font-family:inherit;font-size:18px;font-weight:700;color:#d35400}.nav-btn.active{background-color:#e67e22;color:#fff;border-color:#d35400;box-shadow:0 5px 15px rgba(230,126,34,.4)}.question-card{background:#fff8e1;padding:25px;margin-bottom:25px;border-radius:20px;text-align:left;border-left:8px solid #ffab00;box-shadow:0 4px 10px rgba(0,0,0,.05);break-inside:avoid}.instructions{font-size:18px;color:#444;margin-bottom:15px;font-style:italic;display:block;line-height:1.5}
.instruction-math-block { font-style: normal; font-size: 22px; font-weight: 600; text-align: center; margin: 15px 0 25px 0; color: #333; }
.mc-container{display:flex;flex-direction:column;gap:12px}.mc-option{display:flex;align-items:center;gap:15px;background:#fff;padding:15px;border:2px solid #ffeaa7;border-radius:10px;cursor:pointer;transition:.2s;min-height:50px}.mc-option:hover{border-color:#ffab00;background:#fffcf2}.mc-option input[type=radio],.mc-option input[type=checkbox]{transform:scale(1.5);accent-color:#e67e22;margin-right:10px}.mc-content{font-size:18px;color:#333;display:flex;align-items:center;flex-wrap:wrap;gap:5px}.math-row{font-size:22px;font-weight:600;margin-bottom:25px;color:#444;display:flex;align-items:center;flex-wrap:wrap;gap:5px}.correct-bg{background-color:#e8f5e9!important;border-color:#2e7d32!important;color:#2e7d32!important}.incorrect-bg{background-color:#ffebee!important;border-color:#c62828!important}.correction-text{color:#27ae60;font-weight:700;font-size:16px;background:#e8f5e9;padding:4px 10px;border-radius:8px;margin-left:auto}.footer-controls{margin-top:40px;padding-top:20px;border-top:2px dashed #ffeaa7;display:flex;flex-direction:column;align-items:center;gap:20px}.check-btn{background-color:#00c853;color:#fff;font-family:inherit;padding:15px 50px;border:none;border-radius:50px;font-size:24px;font-weight:600;cursor:pointer;box-shadow:0 8px 0 #009624,0 15px 20px rgba(0,0,0,.2);transition:all .1s}.check-btn:hover{background-color:#00e676;transform:translateY(2px)}.check-btn:active{transform:translateY(6px);box-shadow:0 2px 0 #009624,0 5px 10px rgba(0,0,0,.2)}.feedback-box{font-size:20px;font-weight:700;padding:15px;border-radius:15px;width:100%;max-width:600px;display:none}.feedback-box.correct{display:block;background-color:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}.feedback-box.warning{display:block;background-color:#fff3e0;color:#ef6c00;border:2px solid #ffcc80}.tbd-message{background:#fff;border:3px dashed #ccc;padding:50px;border-radius:20px;color:#777;font-size:24px;margin-top:30px}#print-area{display:none}

/* VISUAL BOX STYLES */
.math-square-box { display: inline-block; width: 24px; height: 24px; border: 2px solid #333; background: #fff; margin: 0 5px; vertical-align: middle; }
.math-circle-box { display: inline-block; width: 28px; height: 28px; border: 2px solid #333; border-radius: 50%; background: #fff; margin: 0 8px; vertical-align: middle; }
.term-wrap { display: inline-block; white-space: nowrap; margin-right: 4px; } 

/* --- PRINT STYLES --- */
@media print {
    @page { size: landscape; margin: 0.4in; }
    body { background: none; background-color: white; color: black; padding: 0; margin: 0; width: 100%; zoom: 0.88; }
    .container { display: none !important; }
    #print-area { display: block !important; width: 100%; padding: 0; margin: 0; }
    
    input::placeholder { color: transparent !important; }
    input::-webkit-input-placeholder { color: transparent !important; }
    
    .print-week-wrap { display: grid; grid-template-columns: 1fr 1fr; grid-gap: 20px; page-break-after: always; width: 100%; margin-bottom: 10px; }
    .print-week-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 8px; }
    .print-day-card { border: 2px solid #444; border-radius: 12px; padding: 10px; background: #fff; break-inside: avoid; page-break-inside: avoid; height: fit-content; }
    .print-day-title { font-size: 18px; font-weight: bold; border-bottom: 1px dashed #ccc; margin-bottom: 8px; padding-bottom: 2px; color: #000; }
    .question-card { border: none; box-shadow: none; background: none; border-left: 3px solid #ccc; border-radius: 0; padding: 4px 8px; margin-bottom: 8px; }
    .instructions { margin-bottom: 4px; font-size: 16px; line-height: 1.3; }
    .instruction-math-block { margin: 8px 0 12px 0; font-size: 18px; }
    .frac-input, .mixed-whole-input, .whole-input { border: 1px solid #000; background-color: white; color: transparent; text-shadow: none; }
    
    /* Hide the Expression Toolbar on print, leave a line for handwriting */
    .expr-toolbar { display: none !important; }
    .expression-input-group { border: none !important; background: transparent !important; margin-top: 10px; }
    .expr-input { border: none !important; border-bottom: 2px solid #000 !important; background: transparent !important; width: 250px; color: transparent; text-shadow: none; }

    .mc-container { gap: 3px; }
    .mc-option { border: 1px solid #aaa; padding: 4px 8px; min-height: auto; font-size: 16px; line-height: 1.3; }
    .mc-option input { transform: scale(1.1); margin-right: 5px; }
    .visual-container { border: 1px solid #ccc; background: none; margin: 5px 0; padding: 5px; gap: 10px; }
    svg { transform: scale(0.9); transform-origin: left center; margin-bottom: -10px; }
    .correction-text { display: none !important; }
    .correct-bg, .incorrect-bg { background-color: white !important; }
    
    .answer-key-box { flex: 1 1 200px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; background: #fff; break-inside: avoid; margin-bottom: 15px; }
    .answer-key-day { margin-top: 8px; margin-bottom: 4px; font-weight: bold; border-bottom: 1px dashed #eee; }
    .answer-item { margin-bottom: 3px; }
}
</style>

<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠 Home</a>
    <button class="print-btn" onclick="window.print()">🖨️ Print Worksheet</button>

    <h1>Grade 5 Math Warmups</h1>

    <div class="module-nav">
        <button class="btn-module" onclick="selectModule(0)">Add/Sub Equiv Fractions</button>
        <button class="btn-module" onclick="selectModule(1)">Mult/Div Fractions I</button>
        <button class="btn-module" onclick="selectModule(2)">Review: Fractions & Ops</button>
        <button class="btn-module" onclick="selectModule(3)">Mult/Div Fractions II</button>
        <button class="btn-module" onclick="selectModule(4)">Volume Concepts</button>
        <button class="btn-module" onclick="selectModule(5)">Review: Area & Volume</button>
        <button class="btn-module" onclick="selectModule(6)">Place Value Systems</button>
        <button class="btn-module" onclick="selectModule(7)">Numerical Expressions</button>
    </div>

    <div class="nav-container" id="navContainer"></div>

    <div id="content-area"></div>
    
    <div class="footer-controls" id="footer-controls" style="display:none;">
        <div id="feedback-box" class="feedback-box"></div>
        <button class="check-btn" onclick="checkAnswers()">Check Answers</button>
    </div>
</div>

<div id="print-area"></div>

<script src="data/gr5/mod1.js"></script>
<script src="data/gr5/mod2.js"></script>
<script src="data/gr5/rev1.js"></script>
<script src="data/gr5/mod3.js"></script>
<script src="data/gr5/mod4.js"></script>
<script src="data/gr5/rev2.js"></script>
<script src="data/gr5/mod5.js"></script>

<script>
    const dayMap = { "Mon": "Monday", "Tue": "Tuesday", "Wed": "Wednesday", "Thu": "Thursday", "Fri": "Friday" };

    // --- NEW EXPRESSION TOOLBAR SCRIPTS ---
    function formatExprInput(input) {
        let val = input.value;
        val = val.replace(/\*/g, 'x').replace(/\//g, '÷');
        if (input.value !== val) {
            let start = input.selectionStart;
            input.value = val;
            input.selectionStart = input.selectionEnd = start;
        }
    }

    function insertMathSymbol(btn, symbol) {
        const input = btn.closest('.expression-input-group').querySelector('.expr-input');
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const text = input.value;
        input.value = text.slice(0, start) + symbol + text.slice(end);
        input.focus();
        input.selectionStart = input.selectionEnd = start + symbol.length;
    }


    // --- VISUAL GENERATORS (FRACTIONS & PIES) ---
    function renderVisualModel(whole, num, den, color = "#ccc") {
        const size = 80; const padding = 10;
        const width = (whole * (size + padding)) + (den > 0 ? size + padding : 0);
        let svg = `<svg width="${Math.max(width * 1.2, 120)}" height="${size+4}" style="overflow:visible; margin:5px;">`;
        for(let i=0; i<whole; i++) { let x = i * (size + padding); svg += `<rect x="${x}" y="0" width="${size}" height="${size}" fill="${color}" stroke="black" stroke-width="2" />`; }
        if(den > 0) {
            let xStart = whole * (size + padding);
            svg += `<rect x="${xStart}" y="0" width="${size}" height="${size}" fill="none" stroke="black" stroke-width="2" />`;
            let sliceWidth = size / den;
            for(let j=0; j<num; j++) svg += `<rect x="${xStart + (j*sliceWidth)}" y="0" width="${sliceWidth}" height="${size}" fill="${color}" stroke="none" />`;
            for(let k=1; k<den; k++) svg += `<line x1="${xStart + (k*sliceWidth)}" y1="0" x2="${xStart + (k*sliceWidth)}" y2="${size}" stroke="black" stroke-width="1" />`;
            svg += `<rect x="${xStart}" y="0" width="${size}" height="${size}" fill="none" stroke="black" stroke-width="2" />`;
        }
        svg += '</svg>'; return svg;
    }
    
    function renderRepeatedVisual(count, num, den, color = "#ccc") {
        const size = 60; const padding = 15; const width = count * (size + padding);
        let svg = `<svg width="${width}" height="${size+4}" style="overflow:visible; margin:5px;">`;
        for(let i=0; i<count; i++) {
            let x = i * (size + padding);
            svg += `<rect x="${x}" y="0" width="${size}" height="${size}" fill="none" stroke="black" stroke-width="2" />`;
            let sliceWidth = size / den;
            for(let j=0; j<num; j++) svg += `<rect x="${x + (j*sliceWidth)}" y="0" width="${sliceWidth}" height="${size}" fill="${color}" stroke="none" />`;
            for(let k=1; k<den; k++) svg += `<line x1="${x + (k*sliceWidth)}" y1="0" x2="${x + (k*sliceWidth)}" y2="${size}" stroke="black" stroke-width="1" />`;
            svg += `<rect x="${x}" y="0" width="${size}" height="${size}" fill="none" stroke="black" stroke-width="2" />`;
        }
        svg += '</svg>'; return svg;
    }

    function renderPieModel(whole, num, den, color="#ccc") {
        const r = 35; const d = r * 2; const padding = 10; const center = r + 2;
        const width = (whole * (d + padding)) + (den > 0 ? d + padding : 0);
        let svg = `<svg width="${Math.max(width * 1.1, 100)}" height="${d+4}" style="overflow:visible; margin:5px;">`;
        function getCoords(percent) { return [Math.cos(2*Math.PI*percent), Math.sin(2*Math.PI*percent)]; }
        for(let i=0; i<whole; i++) {
            let cx = center + (i * (d + padding));
            svg += `<circle cx="${cx}" cy="${center}" r="${r}" fill="${color}" stroke="black" stroke-width="2" />`;
            if(den > 1) { for(let k=0; k<den; k++) { const [x, y] = getCoords(k/den); svg += `<line x1="${cx}" y1="${center}" x2="${cx + x*r}" y2="${center + y*r}" stroke="black" stroke-width="1" />`; } }
        }
        if(den > 0) {
            let cx = center + (whole * (d + padding));
            svg += `<circle cx="${cx}" cy="${center}" r="${r}" fill="none" stroke="black" stroke-width="2" />`;
            for(let j=0; j<num; j++) {
                const [x1, y1] = getCoords(j/den); const [x2, y2] = getCoords((j+1)/den);
                svg += `<path d="M ${cx} ${center} L ${cx + x1*r} ${center + y1*r} A ${r} ${r} 0 0 1 ${cx + x2*r} ${center + y2*r} Z" fill="${color}" stroke="none" />`;
            }
            for(let k=0; k<den; k++) { const [x, y] = getCoords(k/den); svg += `<line x1="${cx}" y1="${center}" x2="${cx + x*r}" y2="${center + y*r}" stroke="black" stroke-width="1" />`; }
            svg += `<circle cx="${cx}" cy="${center}" r="${r}" fill="none" stroke="black" stroke-width="2" />`;
        }
        svg += '</svg>'; return svg;
    }
    
    function renderRepeatedPie(count, num, den, color="#ccc") {
        const r = 35; const d = r * 2; const padding = 15; const center = r + 2; const width = count * (d + padding);
        let svg = `<svg width="${width}" height="${d+4}" style="overflow:visible; margin:5px;">`;
        function getCoords(percent) { return [Math.cos(2*Math.PI*percent), Math.sin(2*Math.PI*percent)]; }
        for(let i=0; i<count; i++) {
            let cx = center + (i * (d + padding));
            svg += `<circle cx="${cx}" cy="${center}" r="${r}" fill="none" stroke="black" stroke-width="2" />`;
            for(let j=0; j<num; j++) {
                const [x1, y1] = getCoords(j/den); const [x2, y2] = getCoords((j+1)/den);
                svg += `<path d="M ${cx} ${center} L ${cx + x1*r} ${center + y1*r} A ${r} ${r} 0 0 1 ${cx + x2*r} ${center + y2*r} Z" fill="${color}" stroke="none" />`;
            }
            for(let k=0; k<den; k++) { const [x, y] = getCoords(k/den); svg += `<line x1="${cx}" y1="${center}" x2="${cx + x*r}" y2="${center + y*r}" stroke="black" stroke-width="1" />`; }
            svg += `<circle cx="${cx}" cy="${center}" r="${r}" fill="none" stroke="black" stroke-width="2" />`;
        }
        svg += '</svg>'; return svg;
    }

    function renderNumberLine(min = 0, max = 1, step = 0.1, points = []) {
        let svg = `<svg width="440" height="80" style="overflow:visible; margin:10px 0;">`;
        svg += `<line x1="20" y1="40" x2="420" y2="40" stroke="black" stroke-width="2" />`;
        svg += `<polygon points="20,40 30,35 30,45" fill="black" />`;
        svg += `<polygon points="420,40 410,35 410,45" fill="black" />`;
        
        let range = max - min;
        let numTicks = Math.round(range / step);
        if (numTicks === 0 || isNaN(numTicks)) numTicks = 1;
        let spacing = 380 / numTicks;
        
        for (let i = 0; i <= numTicks; i++) {
            let x = 30 + (i * spacing);
            let val = min + (i * step);
            svg += `<line x1="${x}" y1="35" x2="${x}" y2="45" stroke="black" stroke-width="2" />`;
            if (Math.abs(val - Math.round(val)) < 0.001) {
                svg += `<text x="${x}" y="65" text-anchor="middle" font-family="Fredoka" font-size="14">${Math.round(val)}</text>`;
            }
        }
        
        if (points && Array.isArray(points)) {
            points.forEach(p => {
                let x = 30 + (((p.val - min) / range) * 380);
                svg += `<circle cx="${x}" cy="40" r="6" fill="${p.color || '#e67e22'}" stroke="black" stroke-width="2" />`;
                if (p.label) {
                    svg += `<text x="${x}" y="25" text-anchor="middle" font-family="Fredoka" font-size="14" font-weight="bold" fill="${p.color || '#d35400'}">${p.label}</text>`;
                }
            });
        }
        svg += `</svg>`;
        return svg;
    }

    // --- VISUAL GENERATORS (VOLUME & 3D MODELS) ---
    function renderBlockLayer(cols, rows, color="#e0e0e0") {
        let svg = `<svg width="220" height="130" style="overflow:visible; margin: 10px 0;">`;
        const startX = 40; const startY = 100; const dx = 20; const dy = 20; const sx = 12; const sy = -12; 
        for (let j = rows - 1; j >= 0; j--) {
            for (let i = 0; i < cols; i++) {
                let px = startX + i*dx + j*sx; let py = startY - dy + j*sy;
                svg += `<polygon points="${px},${py} ${px+dx},${py} ${px+dx+sx},${py+sy} ${px+sx},${py+sy}" fill="${color}" stroke="#333" stroke-width="1.5" stroke-linejoin="round" />`;
            }
        }
        for (let i = 0; i < cols; i++) {
            let px = startX + i*dx; let py = startY;
            svg += `<polygon points="${px},${py} ${px+dx},${py} ${px+dx},${py-dy} ${px},${py-dy}" fill="${color}" stroke="#333" stroke-width="1.5" stroke-linejoin="round" />`;
        }
        for (let j = 0; j < rows; j++) {
            let px = startX + cols*dx + j*sx; let py = startY + j*sy;
            svg += `<polygon points="${px},${py} ${px+sx},${py+sy} ${px+sx},${py+sy-dy} ${px},${py-dy}" fill="${color}" stroke="#333" stroke-width="1.5" stroke-linejoin="round" />`;
        }
        svg += `</svg>`; return svg;
    }
    
    function renderComposite(type, nameA="A", nameB="B", colorA="#e0e0e0", colorB="#f9f9f9") {
        let svg = `<svg width="240" height="150" style="overflow:visible; margin: 10px 0;">`;
        const F_MAIN = 'font-family="Fredoka" font-weight="bold" font-size="24" fill="#555"';
        if (type === 'stacked') {
            svg += `<polygon points="30,90 60,60 180,60 150,90" fill="${colorA}" stroke="black" stroke-width="2" />`; 
            svg += `<polygon points="30,90 150,90 150,130 30,130" fill="${colorA}" stroke="black" stroke-width="2" />`; 
            svg += `<polygon points="150,90 180,60 180,100 150,130" fill="${colorA}" stroke="black" stroke-width="2" />`; 
            svg += `<polygon points="30,50 60,20 120,20 90,50" fill="${colorB}" stroke="black" stroke-width="2" />`; 
            svg += `<polygon points="30,50 90,50 90,90 30,90" fill="${colorB}" stroke="black" stroke-width="2" />`; 
            svg += `<polygon points="90,50 120,20 120,60 90,90" fill="${colorB}" stroke="black" stroke-width="2" />`; 
            svg += `<text x="90" y="118" text-anchor="middle" ${F_MAIN}>${nameA}</text>`;
            svg += `<text x="60" y="78" text-anchor="middle" ${F_MAIN}>${nameB}</text>`;

    function renderSegment(seg) {
        if (!seg) return '';
        if (seg.type === 'text') return `<div class="mixed-text-container">${seg.val || ''}</div>`;
        if (seg.type === 'break') return `<div style="width:100%; height: 5px;"></div>`; 
        if (seg.type === 'fraction') return renderFraction(seg.n, seg.d);
        if (seg.type === 'mixed') return `<div class="whole-part">${seg.w}</div>` + renderFraction(seg.n, seg.d);
        if (seg.type === 'box') return `<div class="math-square-box"></div>`;
        if (seg.type === 'circle_box') return `<div class="math-circle-box"></div>`;
        if (seg.type === 'term_wrap') return `<span class="term-wrap">${(seg.items||[]).map(s => renderSegment(s)).join('')}</span>`;
        if (seg.type === 'fraction_group') return `<div class="fraction-input-group" data-answer="${seg.ans}"><input type="number" class="frac-input" placeholder=""><div class="frac-line"></div><input type="number" class="frac-input" placeholder=""></div>`;
        if (seg.type === 'mixed_group') return `<div class="mixed-input-group" data-answer="${seg.ans}"><input type="number" class="mixed-whole-input" placeholder=""><div class="mixed-frac-container"><input type="number" class="frac-input" placeholder=""><div class="frac-line"></div><input type="number" class="frac-input" placeholder=""></div></div>`;
        if (seg.type === 'whole_number') return `<div class="whole-input-group" data-answer="${seg.ans}"><input type="number" class="whole-input" placeholder=""></div>`;
        
        // EXPRESSION INPUT UI
        if (seg.type === 'expression_input') {
            let ansStr = JSON.stringify(seg.ans).replace(/"/g, '&quot;');
            return `<div class="expression-input-group" data-answers="${ansStr}">
                <input type="text" class="expr-input" oninput="formatExprInput(this)" placeholder="Type here...">
                <div class="expr-toolbar">
                    <button type="button" class="btn-math" onclick="insertMathSymbol(this, '(')">(</button>
                    <button type="button" class="btn-math" onclick="insertMathSymbol(this, ')')">)</button>
                    <button type="button" class="btn-math" onclick="insertMathSymbol(this, '+')">+</button>
                    <button type="button" class="btn-math" onclick="insertMathSymbol(this, '-')">-</button>

    function renderSection(section, index) {
        if (!section) return '';
        let html = `<div class="question-card">`;
        html += `<div class="instructions"><span style="margin-right:5px; font-weight:bold;">${index + 1}.</span>`;
        if (Array.isArray(section.instruction)) { section.instruction.forEach(seg => html += renderSegment(seg)); } else { html += `<span>${section.instruction || ''}</span>`; }
        html += `</div>`;

        if (section.instructionMath && Array.isArray(section.instructionMath)) {
            html += `<div class="instruction-math-block">`;
            section.instructionMath.forEach(seg => html += renderSegment(seg));
            html += `</div>`;
        }

        if (section.type === 'mixed_row' || section.type === 'visual_problem' || section.type === 'number_line') {
            if (section.type === 'visual_problem') {
                html += `<div class="visual-container">`;
                if (section.models && Array.isArray(section.models)) {
                    section.models.forEach(m => {
                        html += `<div class="visual-item">`;
                        if (m.label) html += `<div class="visual-label">${m.label}</div>`;
                        
                        if (m.type === 'composite') html += renderComposite(m.compType, m.nameA, m.nameB, m.colorA, m.colorB);
                        else if (m.type === 'block_layer') html += renderBlockLayer(m.cols, m.rows, m.color);
                        else if (m.type === 'rectangle') html += renderRectangle(m.wLabel, m.hLabel, m.color);
                        else if (m.type === 'prism') html += renderPrism(m.lLabel, m.wLabel, m.hLabel, m.bLabel, m.color);
                        else if (m.type === 'pie') html += renderPieModel(m.whole || 0, m.num, m.den, m.color || '#9b59b6');
                        else if (m.num !== undefined) html += renderVisualModel(m.whole || 0, m.num, m.den, m.color || '#3498db');
                        
                        html += `</div>`;
                    });
                }
                html += `</div>`;
            } else if (section.type === 'number_line') {
                html += `<div class="visual-container" style="border:none; background:none;">${renderNumberLine(section.min, section.max, section.step, section.points)}</div>`;
            }
            if (section.problems && Array.isArray(section.problems)) {
                section.problems.forEach(prob => {
                    html += `<div class="math-row" style="justify-content:center;">`;
                    if (prob.segments && Array.isArray(prob.segments)) {
                        prob.segments.forEach(seg => html += renderSegment(seg));
                    }
                    html += `</div>`;
                });
            }
        }
        else if (section.type === 'multiple_choice') {
            html += `<div class="mc-container">`;
            const inputType = section.select_all ? 'checkbox' : 'radio';
            
            if (section.options && Array.isArray(section.options)) {
                section.options.forEach((opt, idx) => {
                    const warningAttr = opt.warning ? `data-warning="${opt.warning}"` : '';
                    html += `<label class="mc-option" data-correct="${opt.correct}" ${warningAttr}>
                        <input type="${inputType}" name="mc_q_${index}" value="${idx}">
                        <div class="mc-content">`;
                        if (opt.content && Array.isArray(opt.content)) {
                            opt.content.forEach(seg => html += renderSegment(seg));
                        }
                    html += `</div></label>`;
                });
            }
            html += `<div class="correction-text" style="display:none;"></div></div>`;
        }
        html += `</div>`;
        return html;
    }

                if(i.parentElement.classList.contains('mc-option')){
                    i.parentElement.style.border = "2px solid #ffeaa7";
                    i.parentElement.classList.remove('correct-bg', 'incorrect-bg');
                }
            }
        });
        document.querySelectorAll('.correction-text').forEach(f => f.style.display = 'none');
    }

    function selectModule(idx) { currentModuleIndex = idx; currentWeekIndex = 0; currentDayIndex = 0; renderDay(); updateBtns(idx); }
    function selectDay(wIdx, dIdx) { currentWeekIndex = wIdx; currentDayIndex = dIdx; renderDay(); }
    function updateBtns(idx) { document.querySelectorAll('.btn-module').forEach((b, i) => { if(i===idx) b.classList.add('active'); else b.classList.remove('active'); }); }

    function checkAnswers() {
        currentAttempts++; let correctCount = 0; let totalCount = 0;
        
        // Frac Groups
        document.querySelectorAll('.fraction-input-group').forEach(group => {
            if(group.closest('.mixed-input-group')) return;
            totalCount++;
            const inputs = group.querySelectorAll('input'); const n = parseFloat(inputs[0].value); const d = parseFloat(inputs[1].value);
            const target = parseFloat(group.getAttribute('data-answer'));
            let isCorrect = (!isNaN(n) && !isNaN(d) && d!==0 && Math.abs((n/d)-target) < 0.001);
            if(isCorrect) { group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; }
            else { group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); }
        });
        // Mixed Groups
        document.querySelectorAll('.mixed-input-group').forEach(group => {
            totalCount++;
            const w = parseFloat(group.querySelector('.mixed-whole-input').value)||0;
            const n = parseFloat(group.querySelector('.frac-input:nth-of-type(1)').value)||0;
            const d = parseFloat(group.querySelector('.frac-input:nth-of-type(2)').value)||1;
            const target = parseFloat(group.getAttribute('data-answer'));
            if(Math.abs((w+(n/d))-target) < 0.001) { group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; }
            else { group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); }
        });
        // Whole Number Groups
        document.querySelectorAll('.whole-input-group').forEach(group => {
            totalCount++;
            const input = group.querySelector('.whole-input');
            const val = parseFloat(input.value);
            const target = parseFloat(group.getAttribute('data-answer'));
            if(!isNaN(val) && Math.abs(val - target) < 0.001) { 
                group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; 
            } else { 
                group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); 
                if(currentAttempts >= 2) {
                    input.value = target;
                    input.style.color = "#c0392b";
                    input.style.fontWeight = "bold";
                }
            }
        });

        // Expression Groups
        document.querySelectorAll('.expression-input-group').forEach(group => {
            totalCount++;
            const input = group.querySelector('.expr-input');
            // Normalize: remove spaces, force lowercase, standard 'x'
            let val = input.value.replace(/\s+/g, '').toLowerCase().replace(/×/g, 'x').replace(/\*/g, 'x').replace(/\//g, '÷');
            const targets = JSON.parse(group.getAttribute('data-answers'));
            
            let isCorrect = targets.includes(val);
            if(isCorrect) { 
                group.classList.add('correct-bg'); group.classList.remove('incorrect-bg'); correctCount++; 
            } else { 
                group.classList.add('incorrect-bg'); group.classList.remove('correct-bg'); 
                if(currentAttempts >= 2) {
                    input.value = targets[0]; // Reveal the first acceptable answer
                    input.style.color = "#c0392b";
                    input.style.fontWeight = "bold";
                }
            }
        });
        
        // MC & Checkboxes
        document.querySelectorAll('.mc-container').forEach(container => {
            totalCount++; 
            const options = container.querySelectorAll('.mc-option');
            if (!options || options.length === 0) return;
            const isCheckbox = options[0].querySelector('input').type === 'checkbox';
            
            let isCorrectGroup = false;
            
            if (isCheckbox) {
                let allCorrectChecked = true;
                let noIncorrectChecked = true;
                
                options.forEach(opt => {
                    const checked = opt.querySelector('input').checked;
                    const correct = opt.getAttribute('data-correct') === 'true';
                    if (correct && !checked) allCorrectChecked = false;
                    if (!correct && checked) noIncorrectChecked = false;
                });
                isCorrectGroup = allCorrectChecked && noIncorrectChecked;
            } else {
                options.forEach(opt => {
                    if(opt.querySelector('input').checked && opt.getAttribute('data-correct')==='true') isCorrectGroup = true;
                });
            }
            
            const feedback = container.querySelector('.correction-text');
            feedback.style.display = "inline-block";
            let warningMsg = "";
            
            options.forEach(opt => {
                const checked = opt.querySelector('input').checked;
                const isCorrect = opt.getAttribute('data-correct') === 'true';
                const warning = opt.getAttribute('data-warning');
                
                opt.style.border = "2px solid #ffeaa7"; 
                opt.classList.remove('correct-bg','incorrect-bg');
                
                if(checked) {
                    if(isCorrect) opt.classList.add('correct-bg');
                    else {
                        opt.classList.add('incorrect-bg');
                        if(warning) warningMsg = warning;
                    }
                }
                
                if(isCorrect && (isCorrectGroup || currentAttempts >= 2)) {
                    opt.style.border = "2px solid #27ae60";
                }
            });

            if(isCorrectGroup) {
                correctCount++; feedback.innerHTML = "Correct!"; feedback.className = "correction-text correct-bg";
                feedback.style.backgroundColor="#e8f5e9"; feedback.style.color="#2e7d32";
            } else {
                if(warningMsg) {
                    feedback.innerHTML = warningMsg;
                    feedback.style.backgroundColor = "#fff3e0"; feedback.style.color = "#e67e22";
                } else if(currentAttempts < 2) {
                    feedback.innerHTML = "Try Again";
                    feedback.style.backgroundColor = "#fadbd8"; feedback.style.color = "#c0392b";
                } else {
                    feedback.innerHTML = "Solution Shown";
                    feedback.style.backgroundColor = "#fff3e0"; feedback.style.color = "#e67e22";
                }
            }
        });

        const fbBox = document.getElementById('feedback-box'); fbBox.style.display = 'block';
        if(correctCount === totalCount && totalCount > 0) { fbBox.className = 'feedback-box correct'; fbBox.innerHTML = "🌟 Amazing! You got everything correct! 🌟"; }
        else { fbBox.className = 'feedback-box warning'; fbBox.innerHTML = `You got ${correctCount} out of ${totalCount} correct. ${currentAttempts < 2 ? 'Try again!' : 'Review the solutions.'}`; }
    }

    // --- AUTOMATIC PRINT PREPARATION ---
    function buildPrintHTML() {
        const module = appData.modules[currentModuleIndex];
        if (!module || !module.weeks || module.weeks.length === 0) { 
            document.getElementById('print-area').innerHTML = "<div style='padding: 20px; font-size: 20px;'>No content available to print.</div>";
            return; 
        }
        
        let fullHtml = ``;
        let answerKeyHtml = `<div class="print-week-wrap" style="display:block; page-break-before: always;">
            <div class="print-week-header"><div style="font-size: 24px; font-weight: bold;">Answer Key - ${module.name}</div></div>
            <div style="display: flex; flex-wrap: wrap; gap: 20px; font-size: 14px; text-align: left;">`;
        
        module.weeks.forEach((week, wIdx) => {
            fullHtml += `<div class="print-week-wrap">`;
            
            fullHtml += `
            <div class="print-week-header">
                <div style="font-size: 24px; font-weight: bold;">Week ${week.weekNum}</div>
                <div style="display: flex; gap: 50px; font-size: 18px;">
                    <span>Name: __________________________</span>
                    <span>Date: __________________</span>
                </div>
            </div>`;
            
            answerKeyHtml += `<div class="answer-key-box">
                <strong style="font-size: 16px; color:#d35400;">Week ${week.weekNum}</strong><br>`;

            if (week.days) {
                week.days.forEach(day => {
                    const dayName = dayMap[day.name] || day.name;
                    
                    fullHtml += `<div class="print-day-card">
                        <div class="print-day-title">${dayName}</div>`;
                    
                    answerKeyHtml += `<div class="answer-key-day">${dayName}</div>`;
                    
                    if (day.sections) {
                        day.sections.forEach((sec, idx) => {
                            fullHtml += renderSection(sec, idx);
                            
                            let ansList = [];
                            if (sec.type === 'multiple_choice' && sec.options) {
                                sec.options.forEach((opt, i) => { 
                                    if(opt.correct) ansList.push(String.fromCharCode(65+i)); 
                                });
                            } else if (sec.problems) {
                                sec.problems.forEach(prob => {
                                    if (prob.segments) {
                                        prob.segments.forEach(seg => {
                                            if (seg.ans !== undefined) {
                                                // Handle Expressions (array of strings) vs Numbers
                                                if (seg.type === 'expression_input' && Array.isArray(seg.ans)) {
                                                    ansList.push(seg.ans[0]);
                                                } else {
                                                    let val = seg.ans;
                                                    if (typeof val === 'number' && !Number.isInteger(val)) {
                                                        val = parseFloat(val.toFixed(4));
                                                    }
                                                    ansList.push(val);
                                                }
                                            }
                                        });
                                    }
                                });
                            }
                            answerKeyHtml += `<div class="answer-item"><strong>${idx + 1}.</strong> ${ansList.length > 0 ? ansList.join(', ') : '<em>n/a</em>'}</div>`;
                        });
                    }
                    
                    fullHtml += `</div>`;
                });
            }
            
            fullHtml += `</div>`; 
            answerKeyHtml += `</div>`; 
        });

        answerKeyHtml += `</div></div>`;
        document.getElementById('print-area').innerHTML = fullHtml + answerKeyHtml;
    }

    window.addEventListener('beforeprint', buildPrintHTML);
    selectModule(7); 
</script>
