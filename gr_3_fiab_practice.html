<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 3 Math Warmups</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- CORE STYLES --- */
        body{font-family:'Fredoka','Comic Sans MS',sans-serif;background:linear-gradient(120deg,#a1c4fd,#c2e9fb) fixed;padding:20px;text-align:center;color:#333;margin:0;-webkit-print-color-adjust:exact}
        .container{max-width:900px;margin:30px auto;background:#fff;padding:35px;border-radius:30px;box-shadow:0 10px 0 #5c9ded,0 20px 30px rgba(0,0,0,.2);border:5px solid #d4e6f7;min-height:700px;position:relative}
        h1{color:#2c7be5;font-size:36px;margin:10px 0 30px;text-shadow:2px 2px 0 #bae0ff} h3{color:#555;font-size:24px;border-bottom:2px dashed #d4e6f7;padding-bottom:10px;text-align:left}
        .print-btn,.home-btn{position:absolute;top:20px;background:#fff;color:#555;border:2px solid #ccc;padding:8px 15px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;transition:.2s;z-index:100;text-decoration:none}
        .print-btn{right:20px} .home-btn{left:20px;background:#f0f0f0} .print-btn:hover,.home-btn:hover{background:#e0e0e0;border-color:#bbb}
        
        /* Header for Print Only - HIDDEN ON SCREEN */
        .print-header { display: none; }
        .print-spacer { display: none; } 
        .answer-key-page { display: none; }

        /* Nav & Layout */
        .module-nav{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;border-bottom:2px solid #eee;padding-bottom:20px}
        .btn-module{background:#6c5ce7;color:#fff;border:none;border-radius:12px;padding:12px 20px;cursor:pointer;font-size:16px;font-weight:600;box-shadow:0 5px 0 #5b4cc4;transition:.2s;flex:1;min-width:200px;max-width:260px}
        .btn-module:hover{background:#7d6cfeb4;transform:translateY(-2px)} .btn-module.active{background:#4834d4;transform:translateY(4px);box-shadow:0 1px 0 #5b4cc4;border:2px solid #a29bfe}
        .nav-container{display:flex;flex-direction:column;gap:20px;margin-bottom:40px} .week-row{display:flex;justify-content:center;gap:15px;flex-wrap:wrap}
        .week-label{width:100%;color:#5c9ded;font-weight:700;font-size:18px;text-transform:uppercase}
        .nav-btn{background:#f0f7ff;border:3px solid #b3d7ff;border-radius:15px;padding:10px 20px;cursor:pointer;min-width:80px;height:50px;font-weight:700;color:#555;transition:.2s}
        .nav-btn:hover{transform:translateY(-3px);border-color:#5c9ded} .nav-btn.active{background:#2c7be5;color:#fff;border-color:#1a5bb8;box-shadow:0 5px 15px rgba(44,123,229,.4)}
        
        /* Questions */
        .question-card{background:#f4f9fc;padding:25px;margin-bottom:25px;border-radius:20px;text-align:left;border-left:8px solid #ffab00;box-shadow:0 4px 10px rgba(0,0,0,.05);break-inside:avoid}
        .instructions{font-size:18px;color:#444;margin-bottom:20px;font-style:italic}
        .math-problem { display: block; font-size: 20px; margin-bottom: 20px; color: #444; line-height: 1.6; }
        .input-box{ display: inline-block; vertical-align: middle; padding:8px; font-size:20px; width:80px; border:3px solid #ffab00; border-radius:12px; background:#fffcf2; text-align:center; outline:none; margin-left: 5px; }
        .input-box.correct{border-color:#2e7d32;background:#e8f5e9;color:#2e7d32} .input-box.incorrect{border-color:#c62828;background:#ffebee}
        .unknown-square{display:inline-block;width:24px;height:24px;border:3px solid #555;border-radius:4px;vertical-align:-5px;margin:0 4px;background:#fff}
        
        /* Grid / Checkbox Styles */
        table.caaspp-grid{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:15px;overflow:hidden;border:2px solid #d4e6f7;margin-bottom:20px}
        table.caaspp-grid th{background:#d4e6f7;padding:15px;color:#2c7be5;font-weight:700;border-bottom:2px solid #fff}
        table.caaspp-grid td{padding:15px;border-bottom:1px solid #eee;text-align:center;vertical-align:middle}
        table.caaspp-grid td:first-child{text-align:left;font-weight:700;color:#444;padding-left:20px;border-right:1px solid #eee}
        
        /* Custom Checkbox UI */
        .checkbox-container { display: inline-block; position: relative; padding-left: 35px; margin-bottom: 12px; cursor: pointer; font-size: 22px; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .checkbox-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; top: -10px; left: 0; height: 30px; width: 30px; background-color: #fff; border: 3px solid #b3d7ff; border-radius: 8px; }
        .checkbox-container:hover input ~ .checkmark { background-color: #f0f7ff; }
        .checkbox-container input:checked ~ .checkmark { background-color: #2c7be5; border-color: #2c7be5; }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .checkbox-container input:checked ~ .checkmark:after { display: block; left: 9px; top: 3px; width: 8px; height: 16px; border: solid white; border-width: 0 4px 4px 0; -webkit-transform: rotate(45deg); -ms-transform: rotate(45deg); transform: rotate(45deg); }
        .checkbox-container.correct-check .checkmark { background-color: #00c853 !important; border-color: #00c853 !important; }
        .checkbox-container.incorrect-check .checkmark { background-color: #e74c3c !important; border-color: #e74c3c !important; }

        /* Multiple Choice & Double Input */
        .mc-option{ display: flex; align-items: center; gap: 15px; font-size: 20px; margin-bottom: 15px; color: #444; padding:10px; border-radius:10px; cursor:pointer; transition:background .2s } 
        .mc-option:hover{background:#e6f2ff}
        .mc-correct{background:#e8f5e9!important;border:2px solid #2e7d32} .mc-incorrect{background:#ffebee!important;border:2px solid #c62828}
        .double-input-container{background:#fff;padding:25px;border-radius:15px;border:3px dashed #cdb4db;text-align:center} .box-row{display:flex;justify-content:center;gap:30px;margin-top:15px}

        /* Controls */
        .footer-controls{margin-top:40px;padding-top:20px;border-top:2px dashed #d4e6f7;display:flex;flex-direction:column;align-items:center;gap:20px}
        .check-btn,.btn-extra{color:#fff;padding:15px 50px;border:none;border-radius:50px;font-size:24px;font-weight:600;cursor:pointer;transition:.1s;font-family:inherit}
        .check-btn{background:#00c853;box-shadow:0 8px 0 #009624} .check-btn:hover{background:#00e676;transform:translateY(2px)} .check-btn:active{transform:translateY(6px);box-shadow:0 2px 0}
        .check-btn:disabled{background:#95a5a6;box-shadow:none;transform:translateY(6px)}
        .btn-extra{background:#9b59b6;box-shadow:0 8px 0 #8e44ad;font-size:18px;margin-top:40px;padding:12px 30px} .btn-extra:hover{background:#af7ac5;transform:translateY(2px)}
        .feedback-box{font-size:20px;font-weight:700;padding:15px;border-radius:15px;width:100%;max-width:600px;display:none}
        .feedback-box.correct{display:block;background:#e8f5e9;color:#2e7d32;border:2px solid #a5d6a7}
        .feedback-box.warning{display:block;background:#fff3e0;color:#ef6c00;border:2px solid #ffcc80}
        .feedback-box.info{display:block;background:#e3f2fd;color:#1565c0;border:2px solid #90caf9}
        .hidden{display:none} .print-mod-label{display:none}
        .correction-text{color:#27ae60;font-weight:700;font-size:18px;background:#e8f5e9;padding:5px 10px;border-radius:10px;border:2px solid #a5d6a7;margin-left:10px}
        
        /* Extra Practice Styles */
        #extraPracticeContainer{margin-top:30px;background:#fcf4fc;padding:25px;border-radius:20px;border:4px dashed #cdb4db}
        .drill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
        .drill-card{background:#fff;padding:15px;border-radius:15px;box-shadow:0 2px 5px rgba(0,0,0,.05);font-size:20px;font-weight:700;display:flex;justify-content:center;gap:10px;border:2px solid transparent}
        .drill-input{width:60px!important;padding:5px!important;font-size:20px!important;border:3px solid #cdb4db!important;border-radius:8px!important;text-align:center;background:#fff}

        /* --- PRINT STYLES --- */
        @media print {
            @page {
                size: landscape;
                margin: 0.3in;
            }
            body {
                background: none;
                color: #000;
                padding: 0;
                margin: 0;
                zoom: 0.95;
            }

            /* Hide UI Elements */
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; margin: 0; padding: 0; }
            .module-nav, .nav-container, .footer-controls, .print-btn, .home-btn, 
            #placeholder, .btn-extra, #extraPracticeContainer, .tbd-message, h1 {
                display: none !important;
            }

            /* 2-Column Grid Layout */
            #content-area {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                grid-gap: 30px;
                width: 100%;
            }

            /* Header: Spans Full Width */
            .print-header {
                grid-column: 1 / -1;
                display: flex !important;
                justify-content: center;
                gap: 50px;
                width: 100%;
                font-size: 20px;
                font-weight: 600;
                margin-top: 10px;
                margin-bottom: 5px;
                padding-bottom: 10px;
                border-bottom: 2px solid #000;
                white-space: nowrap;
            }

            /* Individual Day Styling */
            .day-content {
                display: block !important;
                border: 2px solid #444;
                border-radius: 15px;
                padding: 20px;
                height: fit-content;
                break-inside: avoid;
                page-break-inside: avoid;
            }
            
            /* EXPLICIT BREAKS */
            .print-break {
                break-after: page;
                page-break-after: always;
            }

            /* Spacer Logic */
            .print-spacer {
                display: block !important; 
                border: none;
                height: 10px; 
            }

            /* Answer Key Page */
            .answer-key-page {
                display: block !important;
                grid-column: 1 / -1;
                break-before: page;
                page-break-before: always;
                text-align: left;
                padding: 20px;
                border: 2px solid #000;
                border-radius: 15px;
            }
            .ak-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
            .ak-week h4 { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; font-size: 20px; }
            .ak-day { margin-bottom: 15px; font-size: 14px; line-height: 1.4; border-bottom: 1px dashed #ccc; padding-bottom: 5px;}
            .ak-day strong { display: block; color: #444; margin-bottom: 2px; }

            /* Internal Print Styling */
            h3 { color: #000; border-bottom: 1px solid #000; margin-top: 0; font-size: 20px; }
            .print-mod-label { display: inline-block !important; float: right; font-size: 14px; color: #555; }
            .question-card { border: 1px solid #ccc; box-shadow: none; background: #fff; border-left: 5px solid #ccc; border-radius: 10px; margin-bottom: 15px; padding: 15px; }
            
            .math-problem { display: block; margin-bottom: 15px; } 

            /* Inputs */
            table.caaspp-grid { border: 1px solid #000; }
            table.caaspp-grid th { background: #eee; color: #000; border-bottom: 1px solid #000; }
            table.caaspp-grid td { border-bottom: 1px solid #ccc; }
            .input-box { border: 2px solid #000; background: #fff; color: transparent; text-shadow: 0 0 0 #000; display: inline-block; vertical-align: middle; }
            .checkbox-container input { position: static; opacity: 1; height: 16px; width: 16px; } .checkmark { display: none; }
            .correction-text, .grid-answer-indicator { display: none !important; }
            .double-input-container { border: 2px dashed #000; }
            .mc-option { border: 1px solid #ccc; display: flex; align-items: center; }
        }
    </style>

    <script src="data/gr3/mod1.js"></script>
    <script src="data/gr3/mod2.js"></script>
    <script src="data/gr3/mod3.js"></script>
    <script src="data/gr3/mod4.js"></script>
    </head>
<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠 Home</a>
    <button class="print-btn" onclick="window.print()">🖨️ Print Worksheet</button>

    <h1>Grade 3 Math Warmups</h1>

    <div class="module-nav">
        <button class="btn-module" onclick="selectModule(0)">Multiply & Divide Within 100</button>
        <button class="btn-module" onclick="selectModule(1)">Mult/Div: Interpret & Solve</button>
        <button class="btn-module" onclick="selectModule(2)">Properties of Mult/Div</button>
        <button class="btn-module" onclick="selectModule(3)">Number & Ops in Base Ten</button>
        <button class="btn-module" onclick="selectModule(4)" style="background:#0984e3; box-shadow:0 5px 0 #0764ab;">Two-Week Review</button>
    </div>

    <div class="nav-container" id="navContainer"></div>

    <div id="content-area">
        <div id="placeholder" style="text-align: center; color: #888; margin-top: 50px; font-size: 20px;">
            Select a module above to begin!
        </div>
    </div>
    
    <div class="footer-controls" id="footer-controls" style="display:none;">
        <div id="feedback-box" class="feedback-box"></div>
        <button class="check-btn" onclick="checkAnswers()">Check Answers</button>
    </div>
    
    <button id="btnExtra" class="btn-extra hidden" onclick="startExtraPractice()">⚡ Bonus: Extra Practice</button>
    
    <div id="extraPracticeContainer" class="hidden">
        <h3 style="color: #8e44ad; border-bottom: 2px dashed #cdb4db;">Mixed Multiplication & Division Drills</h3>
        <p style="margin-bottom: 20px;">Fill in the missing numbers!</p>
        <div id="drillGrid" class="drill-grid"></div>
        <button class="btn-extra" style="margin-top: 10px; background-color: #9b59b6;" onclick="checkDrills()">Check My Work</button>
        <div id="drillFeedback" class="feedback-box"></div>
    </div>
</div>

<script>

    // --- MODULE 5 DATA (Kept inline until finalized) ---
    const mod5Data = {
        id: "mod-5",
        name: "Two-Week Review",
        weeks: [
            {
                weekNum: 1,
                days: [
                    {
                        id: "m5-w1-mon", name: "Mon", title: "Week 1: Monday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [{ text: "1. &nbsp; What is 73 rounded to the nearest ten?", answer: "70" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 8 &times; 7 = [box]", answer: "56" }] },
                            { type: "mc", instruction: "3. &nbsp; Which expression is equal to 5 &times; (2 &times; 4)?", options: [ { text: "(5 &times; 2) &times; 4", correct: true }, { text: "5 + (2 &times; 4)", correct: false }, { text: "(5 &times; 2) + 4", correct: false } ] }
                        ]
                    },
                    {
                        id: "m5-w1-tue", name: "Tue", title: "Week 1: Tuesday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 30 &times; 4 = [box]", answer: "120" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 6 &times; 7 = 6 &times; (5 + [box])", answer: "2" }, { text: "3. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 8 &times; ([box] + 2) = 48", answer: "4" } ] }
                        ]
                    },
                    {
                        id: "m5-w1-wed", name: "Wed", title: "Week 1: Wednesday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; There are 32 apples shared equally in 4 baskets. How many apples are in each basket?", answer: "8" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 420 - 80 = 400 - [box]", answer: "60" } ] },
                            { type: "mc", instruction: "3. &nbsp; Which expression is equal to 3 &times; (6 &times; 2)?", options: [ { text: "(3 &times; 6) &times; 2", correct: true }, { text: "3 + (6 &times; 2)", correct: false }, { text: "(3 &times; 6) + 2", correct: false } ] }
                        ]
                    },
                    {
                        id: "m5-w1-thu", name: "Thu", title: "Week 1: Thursday",
                        sections: [
                            { type: "grid", instruction: "Decide whether each equation is true or false.", rows: [ { text: "9 &times; 4 = 36", correct: true }, { text: "18 &divide; 3 = 6", correct: true }, { text: "4 &times; 6 = 20", correct: false } ] },
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What is 582 rounded to the nearest hundred?", answer: "600" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 9 &times; 8 = 9 &times; (5 + [box])", answer: "3" } ] }
                        ]
                    },
                    {
                        id: "m5-w1-fri", name: "Fri", title: "Week 1: Friday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 5 &times; [box] = 35", answer: "7" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 5 &times; ([box] + 4) = 35", answer: "3" } ] },
                            { type: "mc", instruction: "3. &nbsp; Which expression is equal to 8 &times; (2 &times; 3)?", options: [ { text: "(8 &times; 2) &times; 3", correct: true }, { text: "8 + (2 &times; 3)", correct: false }, { text: "(8 &times; 2) + 3", correct: false } ] }
                        ]
                    }
                ]
            },
            {
                weekNum: 2,
                days: [
                    {
                        id: "m5-w2-mon", name: "Mon", title: "Week 2: Monday",
                        sections: [
                            { type: "input", instruction: "Enter the unknown number.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 4 &times; 9 = 4 &times; (5 + [box])", answer: "4" } ] },
                            { type: "mc", instruction: "2. &nbsp; Which expression is equal to 2 &times; (5 &times; 5)?", options: [ { text: "(2 &times; 5) &times; 5", correct: true }, { text: "2 + (5 &times; 5)", correct: false }, { text: "(2 &times; 5) + 5", correct: false } ] }
                        ]
                    },
                    {
                        id: "m5-w2-tue", name: "Tue", title: "Week 2: Tuesday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 9 &times; [box] = 54", answer: "6" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 9 &times; ([box] + 3) = 54", answer: "3" }, { text: "3. &nbsp; When rounding to the nearest hundred, what is the greatest whole number that rounds to 300?", answer: "349" } ] }
                        ]
                    },
                    {
                        id: "m5-w2-wed", name: "Wed", title: "Week 2: Wednesday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 532 - 96 = 532 - 100 + [box]", answer: "4" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 7 &times; 9 = 7 &times; (5 + [box])", answer: "4" }, { text: "3. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 56 &divide; 8 = [box]", answer: "7" } ] }
                        ]
                    },
                    {
                        id: "m5-w2-thu", name: "Thu", title: "Week 2: Thursday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 6 &times; [box] = 36", answer: "6" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 6 &times; ([box] + 4) = 36", answer: "2" } ] },
                            { type: "mc", instruction: "3. &nbsp; Which expression is equal to 4 &times; (3 &times; 4)?", options: [ { text: "(4 &times; 3) &times; 4", correct: true }, { text: "4 + (3 &times; 4)", correct: false }, { text: "(4 &times; 3) + 4", correct: false } ] }
                        ]
                    },
                    {
                        id: "m5-w2-fri", name: "Fri", title: "Week 2: Friday",
                        sections: [
                            { type: "input", instruction: "Solve the problems below.", problems: [ { text: "1. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 8 &times; 7 = 8 &times; (5 + [box])", answer: "2" }, { text: "2. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 4 &times; [box] = 32", answer: "8" }, { text: "3. &nbsp; What unknown number makes this equation true?<br>&nbsp;&nbsp;&nbsp;&nbsp; 4 &times; ([box] + 5) = 32", answer: "3" } ] },
                            { type: "mc", instruction: "4. &nbsp; Which expression is equal to 7 &times; (3 &times; 2)?", options: [ { text: "(7 &times; 3) &times; 2", correct: true }, { text: "7 + (3 &times; 2)", correct: false }, { text: "(7 &times; 3) + 2", correct: false } ] }
                        ]
                    }
                ]
            }
        ]
    };


    // --- MAIN STATE & LOGIC ---
    let currentModuleIndex = -1;
    let currentDayId = '';
    let attempts = {}; 

    function selectModule(index) {
        // Reconstruct the appData object using the loaded external files.
        // We do this here inside the function to ensure the external scripts 
        // have fully loaded and populated their variables into the window object.
        const appData = {
            modules: [
                typeof mod1Data !== 'undefined' ? mod1Data : {name: "Module 1", weeks: false}, 
                typeof mod2Data !== 'undefined' ? mod2Data : {name: "Module 2", weeks: false}, 
                typeof mod3Data !== 'undefined' ? mod3Data : {name: "Module 3", weeks: false}, 
                typeof mod4Data !== 'undefined' ? mod4Data : {name: "Module 4", weeks: false},
                mod5Data // Append inline Module 5
            ]
        };

        if(index < 0 || index >= appData.modules.length) index = 0;
        currentModuleIndex = index;
        
        // Update URL Params
        const url = new URL(window.location);
        url.searchParams.set('module', index);
        window.history.pushState({}, '', url);

        document.querySelectorAll('.btn-module').forEach((btn, idx) => btn.classList.toggle('active', idx === index));

        const module = appData.modules[index];
        const navContainer = document.getElementById('navContainer');
        const contentArea = document.getElementById('content-area');
        
        // Reset View
        navContainer.innerHTML = '';
        contentArea.innerHTML = ''; // Clear placeholder out entirely
        document.getElementById('footer-controls').style.display = 'none';
        
        // Toggle Extra Practice
        const extraBtn = document.getElementById('btnExtra');
        const extraCont = document.getElementById('extraPracticeContainer');
        if(module.weeks) { extraBtn.classList.remove('hidden'); } 
        else { extraBtn.classList.add('hidden'); extraCont.classList.add('hidden'); }

        if (!module.weeks) {
            contentArea.innerHTML = `<div class="tbd-message">Coming Soon: ${module.name} content is TBD! 🚧</div>`;
            return;
        }

        module.weeks.forEach(week => {
            const label = document.createElement('div');
            label.className = 'week-label';
            if (week.weekNum > 1) label.style.marginTop = '15px';
            label.textContent = `Week ${week.weekNum}`;
            navContainer.appendChild(label);

            const row = document.createElement('div'); 
            row.className = 'week-row';
            
            week.days.forEach(day => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn'; btn.textContent = day.name;
                btn.onclick = () => showDay(day.id, btn);
                row.appendChild(btn);
                
                // --- PRINT HEADER INSERTION ---
                if (day.name === 'Mon') {
                    const printHeader = document.createElement('div');
                    printHeader.className = 'print-header';
                    printHeader.innerHTML = `<span>Name: _______________________________</span><span>Date: ____________________</span>`;
                    contentArea.appendChild(printHeader);
                }

                const dayDiv = document.createElement('div');
                dayDiv.id = day.id; dayDiv.className = 'day-content hidden';
                dayDiv.innerHTML = `<h3>${day.title}<span class="print-mod-label">M${index+1}</span></h3>`;
                
                // --- ADD EXPLICIT BREAK FOR TUESDAY & THURSDAY ---
                if (day.name === 'Tue' || day.name === 'Thu') {
                    dayDiv.classList.add('print-break');
                }
                
                day.sections.forEach(sec => {
                    const card = document.createElement('div'); card.className = 'question-card';
                    const iText = sec.instruction.split(':');
                    const iHtml = iText.length > 1 ? `<strong>${formatText(iText[0]+':')}</strong>${formatText(iText.slice(1).join(':'))}` : formatText(sec.instruction);
                    card.innerHTML = `<p class="instructions">${iHtml}</p>`;
                    
                    if (sec.type === 'grid') card.appendChild(createGrid(sec.rows));
                    else if (sec.type === 'input') sec.problems.forEach(p => card.appendChild(createProblem(p)));
                    else if (sec.type === 'double') card.appendChild(createDouble(sec));
                    else if (sec.type === 'mc') card.appendChild(createMC(sec));
                    dayDiv.appendChild(card);
                });
                contentArea.appendChild(dayDiv);

                // --- INSERT SPACER IF DAY IS FRIDAY ---
                if (day.name === 'Fri') {
                    const spacer = document.createElement('div');
                    spacer.className = 'print-spacer print-break'; 
                    contentArea.appendChild(spacer);
                }
            });
            navContainer.appendChild(row);
        });

        const answerKey = generateAnswerKey(module);
        contentArea.appendChild(answerKey);
    }

    function generateAnswerKey(module) {
        const div = document.createElement('div');
        div.className = 'answer-key-page';
        let html = `<h2>Teacher Answer Key: ${module.name}</h2><div class="ak-cols">`;
        
        module.weeks.forEach(week => {
            html += `<div class="ak-week"><h4>Week ${week.weekNum}</h4>`;
            week.days.forEach(day => {
                html += `<div class="ak-day"><strong>${day.name}:</strong> `;
                let answers = [];
                day.sections.forEach(sec => {
                    if (sec.type === 'input') sec.problems.forEach((p, i) => answers.push(p.answer));
                    if (sec.type === 'double') answers.push(...sec.answers);
                    if (sec.type === 'mc') sec.options.forEach(o => { if(o.correct) answers.push(`(MC: ${o.text})`); });
                    if (sec.type === 'grid') {
                        let bools = sec.rows.map(r => r.correct ? 'T' : 'F').join(', ');
                        answers.push(`[${bools}]`);
                    }
                });
                html += answers.join(' &nbsp;|&nbsp; ');
                html += `</div>`;
            });
            html += `</div>`;
        });
        html += `</div>`;
        div.innerHTML = html;
        return div;
    }

    function showDay(dayId, btn) {
        currentDayId = dayId;
        // Check if placeholder exists before trying to style it
        const ph = document.getElementById('placeholder');
        if (ph) ph.style.display = 'none';
        
        document.querySelectorAll('.day-content').forEach(d => d.classList.add('hidden'));
        document.getElementById(dayId).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('footer-controls').style.display = 'flex';
        
        if (!attempts[dayId]) attempts[dayId] = 0;
        resetUI(dayId);
    }

    // --- DOM BUILDERS ---
    function formatText(t) { return t ? t.replace(/□|\[box\]/g, '<span class="unknown-square"></span>') : t; }

    function createProblem(p) {
        const div = document.createElement('div'); div.className = 'math-problem';
        const input = `<input type="text" class="input-box" data-answer="${p.answer}">`;
        div.innerHTML = p.text.includes('[box]') ? p.text.replace('[box]', input).replace(/□/g, '<span class="unknown-square"></span>') : formatText(p.text) + ' ' + input;
        return div;
    }

    function createGrid(rows) {
        let h = `<table class="caaspp-grid"><tr><th style="width:50%">Statement / Equation</th><th>True</th><th>False</th></tr>`;
        rows.forEach(r => {
            const tBox = `<label class="checkbox-container"><input type="checkbox" data-correct="${r.correct}"><span class="checkmark"></span></label>`;
            const fBox = `<label class="checkbox-container"><input type="checkbox" data-correct="${!r.correct}"><span class="checkmark"></span></label>`;
            h += `<tr data-type="grid-row"><td>${formatText(r.text)}</td><td>${tBox}</td><td>${fBox}</td></tr>`;
        });
        return createElementFromHTML(h + '</table>');
    }

    function createDouble(sec) {
        return createElementFromHTML(`<div class="double-input-container"><div class="double-input-prompt">${formatText(sec.prompt)}</div><p style="margin-top:15px;color:#666">Enter one number in each box:</p><div class="box-row"><input class="input-box" data-answer="${sec.answers[0]}"><input class="input-box" data-answer="${sec.answers[1]}"></div></div>`);
    }

    function createMC(sec) {
        const div = document.createElement('div'); div.setAttribute('data-type', 'mc-container');
        const grp = 'mc_' + Math.random().toString(36).substr(2,9);
        sec.options.forEach(opt => {
            const row = document.createElement('div'); row.className = 'mc-option';
            row.innerHTML = `<input type="radio" name="${grp}" data-correct="${opt.correct}"><span>${formatText(opt.text)}</span>`;
            row.onclick = () => row.querySelector('input').checked = true;
            div.appendChild(row);
        });
        return div;
    }
    
    function createElementFromHTML(htmlString) {
        const div = document.createElement('div'); div.innerHTML = htmlString.trim();
        return div.firstChild; 
    }

    // --- CHECKING LOGIC ---
    function resetUI(dayId) {
        const fb = document.getElementById('feedback-box');
        const btn = document.querySelector('.check-btn');
        if (attempts[dayId] >= 2) {
             fb.className = "feedback-box info"; fb.textContent = "Review your answers above.";
             btn.disabled = true; btn.textContent = "Completed";
             revealAnswers(document.getElementById(dayId));
        } else {
            fb.style.display = 'none'; btn.disabled = false; btn.textContent = "Check Answers";
        }
    }

    function checkAnswers() {
        const c = document.getElementById(currentDayId);
        let allGood = true;

        // Inputs
        c.querySelectorAll('input[type="text"]').forEach(i => {
            if(i.value.trim()===i.dataset.answer){ i.className='input-box correct'; }
            else{ i.className='input-box incorrect'; allGood=false; }
        });

        // Grids
        c.querySelectorAll('tr[data-type="grid-row"]').forEach(row => {
            row.querySelectorAll('.checkbox-container').forEach(l => l.classList.remove('correct-check', 'incorrect-check'));
            
            const [tWrap, fWrap] = row.querySelectorAll('.checkbox-container');
            const [tIn, fIn] = row.querySelectorAll('input');
            const isCorrect = (tIn.dataset.correct==='true' && tIn.checked && !fIn.checked) || (tIn.dataset.correct==='false' && !tIn.checked && fIn.checked);
            
            if (tIn.checked) {
                if(tIn.dataset.correct === 'true') tWrap.classList.add('correct-check');
                else tWrap.classList.add('incorrect-check');
            }
            if (fIn.checked) {
                if(fIn.dataset.correct === 'true') fWrap.classList.add('correct-check');
                else fWrap.classList.add('incorrect-check');
            }
            if(!isCorrect) allGood=false;
        });

        // MC
        c.querySelectorAll('div[data-type="mc-container"]').forEach(mc => {
            let mcHit = false;
            mc.querySelectorAll('.mc-option').forEach(opt => {
                opt.className = 'mc-option';
                const r = opt.querySelector('input');
                if(r.checked) {
                    if(r.dataset.correct==='true'){ opt.classList.add('mc-correct'); mcHit=true; }
                    else opt.classList.add('mc-incorrect');
                }
            });
            if(!mcHit) allGood = false;
        });

        const fb = document.getElementById('feedback-box');
        const btn = document.querySelector('.check-btn');

        if(allGood) {
            fb.className="feedback-box correct"; fb.textContent="🎉 PERFECT! Great job!";
            btn.disabled=true; btn.textContent="Completed"; attempts[currentDayId]=2;
        } else {
            attempts[currentDayId]++;
            if(attempts[currentDayId]<2) { fb.className="feedback-box warning"; fb.textContent="🤔 Not quite. Try again! (Attempt 1 of 2)"; }
            else { fb.className="feedback-box info"; fb.textContent="❌ Nice try! Here are the correct answers."; revealAnswers(c); btn.disabled=true; btn.textContent="Completed"; }
        }
    }

    function revealAnswers(c) {
        c.querySelectorAll('input[type="text"]').forEach(i => {
            if(!i.parentNode.querySelector('.correction-text')) i.parentNode.insertAdjacentHTML('beforeend', `<span class="correction-text">Ans: ${i.dataset.answer}</span>`);
        });
        
        c.querySelectorAll('input[type="checkbox"][data-correct="true"]').forEach(box => {
            const label = box.closest('.checkbox-container');
            if(!label.parentNode.querySelector('.grid-answer-indicator')) {
                label.parentNode.insertAdjacentHTML('beforeend', `<div class="grid-answer-indicator" style="color:#27ae60; font-weight:bold; font-size:14px; margin-top:5px;">(Correct)</div>`);
            }
        });
        
        c.querySelectorAll('input[type="radio"][data-correct="true"]').forEach(r => r.closest('.mc-option').classList.add('mc-correct'));
    }

    // --- EXTRA PRACTICE ---
    let currentDrills = [];
    function startExtraPractice() {
        const c = document.getElementById('extraPracticeContainer'), g = document.getElementById('drillGrid'), fb = document.getElementById('drillFeedback');
        c.classList.remove('hidden'); fb.style.display='none'; c.scrollIntoView({behavior:'smooth'});
        g.innerHTML = ''; currentDrills = [];

        for(let i=0; i<15; i++) {
            let n1 = Math.ceil(Math.random()*10), n2 = Math.ceil(Math.random()*10), isMult = Math.random()>.5;
            let val = isMult ? n1*n2 : n1, eq = isMult ? `${n1} &times; ${n2} = ${val}` : `${n1*n2} &divide; ${n2} = ${n1}`;
            let parts = isMult ? [n1, n2, val] : [n1*n2, n2, n1];
            let missing = Math.floor(Math.random()*3); 
            
            let htmlParts = [isMult?n1:n1*n2, isMult?'&times;':'&divide;', isMult?n2:n2, '=', isMult?val:n1];
            let hIdx = missing === 0 ? 0 : missing === 1 ? 2 : 4;
            let ans = parts[missing];
            
            htmlParts[hIdx] = `<input type="number" id="d-${i}" class="drill-input">`;
            currentDrills.push({id:`d-${i}`, ans: ans});
            g.innerHTML += `<div class="drill-card">${htmlParts.join(' ')}</div>`;
        }
    }

    function checkDrills() {
        let score = 0;
        currentDrills.forEach(d => {
            const el = document.getElementById(d.id), p = el.parentElement;
            if(parseInt(el.value) === d.ans) { score++; p.style.border="2px solid #27ae60"; p.style.background="#e8f5e9"; }
            else { p.style.border="2px solid #e74c3c"; p.style.background="#fadbd8"; }
        });
        const fb = document.getElementById('drillFeedback');
        fb.style.display = 'block';
        fb.className = score===15 ? "feedback-box correct" : "feedback-box warning";
        fb.textContent = score===15 ? "🌟 PERFECT! 15/15! 🌟" : `You got ${score} out of 15 correct.`;
    }

    // --- INITIALIZATION ---
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        let modIndex = parseInt(urlParams.get('module'));
        if (isNaN(modIndex)) modIndex = 0;
        selectModule(modIndex);
    };

</script>
